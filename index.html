    let dcLeaveIntent = null; // { type:'navigate'|'logout', tab? } — action to run once the leave-confirm is resolved

    window.addEventListener('beforeunload', (e) => {
        if (dcDirty) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // Column layout (order / widths / hidden) is a per-browser display preference and persists
    // independently of the main app database, exactly like a spreadsheet's saved view.
    const DC_LAYOUT_KEY = "indus_fire_dc_layout_v2";
    function loadDcLayout() {
        try {
            const raw = localStorage.getItem(DC_LAYOUT_KEY);
            if (!raw) return;
            const layout = JSON.parse(raw);
            const validKeys = new Set(DC_COLUMNS.map(c => c.key));
            if (Array.isArray(layout.order)) {
                const cleaned = layout.order.filter(k => validKeys.has(k));
                DC_COLUMNS.forEach(c => { if (!cleaned.includes(c.key)) cleaned.push(c.key); });
                dcColOrder = cleaned;
            }
            if (layout.widths && typeof layout.widths === 'object') dcColWidths = layout.widths;
            if (Array.isArray(layout.hidden)) dcHidden = new Set(layout.hidden.filter(k => validKeys.has(k) && !DC_FROZEN_KEYS.includes(k)));
        } catch(e) {}
    }
    function saveDcLayout() {
        try {
            localStorage.setItem(DC_LAYOUT_KEY, JSON.stringify({
                order: dcColOrder, widths: dcColWidths, hidden: Array.from(dcHidden)
            }));
        } catch(e) {}
    }
    loadDcLayout();

    // expose appData globally so inline handlers can reach it
    window.appData = appData;

    function loadFromLocalStorage() {
        let data;
        try {
            const raw = localStorage.getItem(DB_KEY);
            data = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SEED));
        } catch(e) { data = JSON.parse(JSON.stringify(SEED)); }
        migrateToItemLevelProcurement(data);
        migrateUsersAndNotifications(data);
        migrateProcHandlers(data);
        migrateDepartments(data);
        migrateSequences(data);
        if (!Array.isArray(data.mrDrafts)) data.mrDrafts = [];
        if (!Array.isArray(data.itemRequests)) data.itemRequests = [];
        return data;
    }

    function parseDocNumber(num, prefix) {
        const re = new RegExp(`^${prefix}-(\\d{4})-(\\d+)$`);
        const m = String(num || '').match(re);
        if (!m) return null;
        return { year: parseInt(m[1], 10), seq: parseInt(m[2], 10) };
    }

    function scanMaxMrSequence(mrs, prefix) {
        let maxYear = 0, maxSeq = 0;
        (mrs || []).forEach(mr => {
            const parsed = parseDocNumber(mr.mrNumber, prefix);
            if (!parsed) return;
            if (parsed.year > maxYear || (parsed.year === maxYear && parsed.seq > maxSeq)) {
                maxYear = parsed.year;
                maxSeq = parsed.seq;
            }
        });
        return { year: maxYear, maxSeq };
    }

    function scanMaxPrSequence(mrs, prefix) {
        const seen = new Set();
        let maxYear = 0, maxSeq = 0;
        (mrs || []).forEach(mr => {
            const pr = mr.prNumber;
            if (!pr || seen.has(pr)) return;
            seen.add(pr);
            const parsed = parseDocNumber(pr, prefix);
            if (!parsed) return;
            if (parsed.year > maxYear || (parsed.year === maxYear && parsed.seq > maxSeq)) {
                maxYear = parsed.year;
                maxSeq = parsed.seq;
            }
        });
        return { year: maxYear, maxSeq };
    }

    function migrateSequences(data) {
        const curYear = new Date().getFullYear();
        if (!data.sequences) {
            data.sequences = JSON.parse(JSON.stringify(SEED.sequences));
        }
        ['mr', 'pr'].forEach(key => {
            const s = data.sequences[key];
            if (!s) data.sequences[key] = JSON.parse(JSON.stringify(SEED.sequences[key]));
            const cfg = data.sequences[key];
            cfg.prefix = cfg.prefix || (key === 'mr' ? 'MR' : 'PR');
            cfg.pad = cfg.pad || 5;
            cfg.year = cfg.year || curYear;
            if (!cfg.next || cfg.next < 1) cfg.next = 1;
            const field = key === 'mr' ? 'mrNumber' : 'prNumber';
            const scan = key === 'mr'
                ? scanMaxMrSequence(data.mrs, cfg.prefix)
                : scanMaxPrSequence(data.mrs, cfg.prefix);
            if (scan.maxSeq > 0 && cfg.next <= scan.maxSeq && (scan.year === cfg.year || !cfg._userSet)) {
                cfg.year = scan.year || cfg.year;
                cfg.next = scan.maxSeq + 1;
            }
        });
    }

    function getSequences() {
        if (!appData.sequences) migrateSequences(appData);
        return appData.sequences;
    }

    function formatDocNumber(cfg) {
        const year = cfg.year || new Date().getFullYear();
        const pad = cfg.pad || 5;
        return `${cfg.prefix}-${year}-${String(cfg.next).padStart(pad, '0')}`;
    }

    function ensureSequenceYear(cfg) {
        const curYear = new Date().getFullYear();
        if (cfg.year !== curYear) {
            cfg.year = curYear;
            cfg.next = 1;
        }
    }

    function peekNextMrNumber() {
        const cfg = { ...getSequences().mr };
        ensureSequenceYear(cfg);
        return formatDocNumber(cfg);
    }

    function consumeNextMrNumber() {
        const cfg = getSequences().mr;
        ensureSequenceYear(cfg);
        const num = formatDocNumber(cfg);
        cfg.next = (Number(cfg.next) || 1) + 1;
        cfg._userSet = true;
        return num;
    }

    function peekNextPrNumber() {
        const cfg = { ...getSequences().pr };
        ensureSequenceYear(cfg);
        return formatDocNumber(cfg);
    }

    function consumeNextPrNumber() {
        const cfg = getSequences().pr;
        ensureSequenceYear(cfg);
        const num = formatDocNumber(cfg);
        cfg.next = (Number(cfg.next) || 1) + 1;
        cfg._userSet = true;
        return num;
    }

    function syncSequencesFromExisting() {
        const curYear = new Date().getFullYear();
        const seq = getSequences();
        const mrScan = scanMaxMrSequence(appData.mrs, seq.mr.prefix);
        const prScan = scanMaxPrSequence(appData.mrs, seq.pr.prefix);
        if (mrScan.maxSeq > 0) { seq.mr.year = mrScan.year || curYear; seq.mr.next = mrScan.maxSeq + 1; }
        if (prScan.maxSeq > 0) { seq.pr.year = prScan.year || curYear; seq.pr.next = prScan.maxSeq + 1; }
        seq.mr._userSet = true;
        seq.pr._userSet = true;
    }

    function migrateProcHandlers(data) {
        if (!Array.isArray(data.procHandlers)) data.procHandlers = [];
        if (!Array.isArray(data.assignmentHistory)) data.assignmentHistory = [];
        const existingNames = new Set(data.procHandlers.map(h => h.name));
        (data.users || []).filter(u => u.role === 'procurement' && !existingNames.has(u.name)).forEach((u, i) => {
            data.procHandlers.push({
                id: "PH-" + (Date.now() + i), name: u.name, empId: u.id || '', dept: u.dept || 'Procurement',
                designation: u.responsibility || 'Procurement Officer', email: '', mobile: '',
                status: u.active === false ? 'Inactive' : 'Active', userLoginId: u.id || '', isManager: true
            });
            existingNames.add(u.name);
        });
        data.procHandlers.forEach(h => { if (h.status !== 'Active' && h.status !== 'Inactive') h.status = 'Active'; if (h.isManager === undefined) h.isManager = false; });
    }

    function activeProcHandlers() { return (appData.procHandlers || []).filter(h => h.status === 'Active'); }
    function procHandlerByName(name) { return (appData.procHandlers || []).find(h => h.name === name); }
    function canReassign() {
        if (!user) return false;
        if (user.role === 'admin') return true;
        const h = (appData.procHandlers || []).find(x => x.userLoginId === user.id);
        return !!(h && h.isManager);
    }

    function migrateDepartments(data) {
        if (!Array.isArray(data.departments)) data.departments = [];
        const existing = new Set(data.departments.map(d => String(d.name || '').trim().toLowerCase()).filter(Boolean));
        const addName = (name) => {
            const n = String(name || '').trim();
            if (!n) return;
            const key = n.toLowerCase();
            if (existing.has(key)) return;
            existing.add(key);
            data.departments.push({ id: 'D-' + (Date.now() + data.departments.length), name: n });
        };
        (data.users || []).forEach(u => addName(u.dept));
        (data.mrs || []).forEach(m => addName(m.dept));
        (data.procHandlers || []).forEach(h => addName(h.dept));
    }

    function departmentNames() {
        return (appData.departments || []).map(d => d.name).filter(Boolean).sort((a, b) => a.localeCompare(b));
    }

    // ── MIGRATION: Approval Level / Notifications ────────────────────────────
    // Backfills the new Approval Level field onto any user saved before this feature existed,
    // and guarantees a notifications array exists — so existing browsers/records keep working
    // without any manual data fix-up.
    function migrateUsersAndNotifications(data) {
        (data.users || []).forEach(u => {
            if (!u.approvalLevel) u.approvalLevel = ROLE_DEFAULT_APPROVAL_LEVEL[u.role] || "L1";
        });
        if (!Array.isArray(data.notifications)) data.notifications = [];
        (data.mrs || []).forEach(mr => {
            if (mr.l1User === undefined) mr.l1User = mr.raisedBy || '';
            if (mr.l2User === undefined) mr.l2User = '';
        });
    }

    // ── MIGRATION: PO / Vendor / Delivery / Status move from PR (MR) level to Item level ────
    // Every line item can now have its own Supplier, Procurement Engineer, PO Number, PO Date,
    // Delivery Date and Status. Existing saved data only ever had these fields on the parent MR
    // (one PO per PR) — this backfills every item with those legacy MR-level values the first
    // time an old record is loaded, so nothing is lost and older PRs keep behaving exactly as
    // before until an item's procurement details are edited individually.
    function migrateToItemLevelProcurement(data) {
        if (data.projects && data.projects.length && typeof data.projects[0] === 'string') {
            data.projects = data.projects.map((p, i) => ({ id: "P-" + (Date.now() + i), name: p, status: "Active", priority: i + 1, bomItems: 0, remarks: "" }));
        }

        (data.mrs || []).forEach(mr => {
            (mr.items || []).forEach(it => {
                // Self-heal: an item that already belongs to a generated PR should never sit at a
                // pre-planning status (this happened for items migrated while an MR was still in
                // the Department Approval chain, before the PLANNED-transition guard recognised
                // those in-between statuses). Runs on every load, independent of _procMigrated.
                if (mr.prNumber && ['RAISED', 'DEPT_APPROVAL_PENDING', 'DEPT_APPROVED', 'QUERY_RAISED', 'AUTHORIZED'].includes(it.status)) {
                    it.status = 'PLANNED';
                }
                if (it._procMigrated) return;
                if (it.poNumber === undefined)         it.poNumber = mr.poNumber || '';
                if (it.poDate === undefined)            it.poDate = mr.poDate || '';
                if (it.vendor === undefined)            it.vendor = mr.vendor || '';
                if (it.procEngineer === undefined)      it.procEngineer = mr.prHandleBy || '';
                if (it.tentativeDeliveryDate === undefined) it.tentativeDeliveryDate = mr.tentativeDeliveryDate || '';
                if (it.actualDeliveryDate === undefined)    it.actualDeliveryDate = mr.actualDeliveryDate || '';
                if (it.materialReceivedDate === undefined)  it.materialReceivedDate = mr.materialReceivedDate || '';
                if (it.procRemarks === undefined)       it.procRemarks = mr.procRemarks || '';
                if (it.receivedQty === undefined)       it.receivedQty = 0;
                if (it.status === undefined) {
                    // Only PRs (prNumber assigned) carry a procurement status; pre-PR items just inherit it.
                    it.status = mr.prNumber ? (mr.status || 'PLANNED') : (mr.status || 'RAISED');
                }
                if (it.holdCancelReason === undefined)        it.holdCancelReason = mr.holdCancelReason || '';
                if (it.holdCancelJustification === undefined) it.holdCancelJustification = mr.holdCancelJustification || '';
                if (it.holdCancelUpdatedBy === undefined)     it.holdCancelUpdatedBy = mr.holdCancelUpdatedBy || '';
                if (it.holdCancelTs === undefined)            it.holdCancelTs = mr.holdCancelTs || null;
                if (it.refMrNumber === undefined)           it.refMrNumber = mr.mrNumber || '';
                it._procMigrated = true;
            });
        });
    }

    // Aggregates per-item statuses back into one overall PR status for screens that show a
    // single status per MR/PR (Work Ledger, Reports, Registry, print sheet, dashboards).
    // Before a PR exists (still in the MR → Authorization → Planning flow) this is simply the
    // MR's own workflow status, unchanged.
    function mrOverallStatus(mr) {
        if (!mr || !mr.prNumber) return mr?.status;
        const items = (mr.items || []).filter(Boolean);
        if (!items.length) return mr.status;
        const statuses = items.map(it => it.status || 'PLANNED');
        if (statuses.every(s => s === 'CANCELLED')) return 'CANCELLED';
        const active = statuses.filter(s => s !== 'CANCELLED');
        if (!active.length) return 'CANCELLED';
        if (active.some(s => s === 'HOLD')) return 'HOLD';
        if (active.every(s => s === 'CLOSED')) return 'CLOSED';
        if (active.some(s => s === 'PARTIAL') || (active.some(s=>s==='CLOSED') && active.some(s=>s!=='CLOSED'))) return 'PARTIAL';
        if (active.some(s => s === 'PROCUREMENT')) return 'PROCUREMENT';
        return 'PLANNED';
    }
    // Effective status for Work Ledger / Reports — item-level statuses roll up once a PR exists.
    function getMrDisplayStatus(mr) {
        return mr && mr.prNumber ? mrOverallStatus(mr) : (mr ? mr.status : '');
    }
    function syncAllMrStatuses() {
        (appData.mrs || []).filter(Boolean).forEach(mr => {
            if (mr.prNumber) mr.status = mrOverallStatus(mr);
        });
    }
    // Distinct, non-empty PO numbers across every item on a PR — a PR can now legitimately have several.
    function mrOverallPoNumbers(mr) {
        const list = Array.from(new Set((mr.items||[]).map(it => it.poNumber).filter(Boolean)));
        if (list.length) return list.join(', ');
        return mr.poNumber || '';
    }

    // saveDB() is defined below as an async function that syncs to Supabase + localStorage

    function persistAppDataKeepDcDirty() {
        if (dcDirty) {
            const disk = loadFromLocalStorage();
            disk.notifications = appData.notifications;
            saveDB(disk);
        } else {
            saveDB();
        }
    }

    // ── HELPERS ────────────────────────────────────────────────────────────
    function fmtDate(ts) { if (!ts) return "-"; const d = new Date(ts); return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
    function fmtDateInput(ts) {
        if (!ts) return "";
        const d = new Date(ts);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function fmtDateTime(ts) { if (!ts) return "-"; const d = new Date(ts); const dateStr = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0'); const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12; if (h === 0) h = 12; return `${dateStr} ${String(h).padStart(2,'0')}:${m} ${ampm}`; }
    // Days the MR has sat in its current status — used for escalation flags & approval KPIs.
    function daysInCurrentStatus(mr) {
        const hist = (mr.history || []).filter(h => h.field === 'status');
        const lastTs = hist.length ? hist[hist.length - 1].ts : mr.createdAt;
        return Math.floor((Date.now() - lastTs) / 86400000);
    }
    // Small red pill shown next to the status badge once an MR has been sitting in an
    // approval queue past the escalation threshold (default 3 days). Purely visual —
    // does not change any workflow logic or auto-advance anything.
    function renderEscalationBadge(mr, thresholdDays) {
        thresholdDays = thresholdDays || 3;
        const days = daysInCurrentStatus(mr);
        if (days < thresholdDays) return '';
        return `<span title="Pending ${days} day(s) in this stage" style="display:inline-flex;align-items:center;gap:4px;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;border-radius:9999px;padding:2px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-left:6px;white-space:nowrap;">⚠ Escalated · ${days}d</span>`;
    }
    // Average approval time (Raised → Final Authorization) overall and per department,
    // plus a live count of MRs currently escalated across the department & final-auth queues.
    function computeApprovalPerformance() {
        const authorized = appData.mrs.filter(m => m.authorizationDate && m.createdAt);
        const times = authorized.map(m => (m.authorizationDate - m.createdAt) / 86400000);
        const avgAll = times.length ? (times.reduce((a,b) => a+b, 0) / times.length) : 0;
        const byDept = {};
        authorized.forEach(m => {
            byDept[m.dept] = byDept[m.dept] || [];
            byDept[m.dept].push((m.authorizationDate - m.createdAt) / 86400000);
        });
        const deptAvg = Object.entries(byDept)
            .map(([dept, arr]) => ({ dept, avg: arr.reduce((a,b) => a+b, 0) / arr.length, count: arr.length }))
            .sort((a,b) => b.avg - a.avg);
        const escalatedCount = appData.mrs.filter(m =>
            ['DEPT_APPROVAL_PENDING','RAISED'].includes(m.status) && daysInCurrentStatus(m) >= 3
        ).length;
        return { avgAll, deptAvg, escalatedCount };
    }
    function renderApprovalPerformanceKPIs() {
        const p = computeApprovalPerformance();
        return `
        <div class="bg-white rounded-2xl border border-rule shadow-panel p-6">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <h3 class="text-sm font-display font-bold uppercase tracking-widest text-slate-700">Approval Performance</h3>
                ${p.escalatedCount > 0 ? `<span class="text-[10px] font-black uppercase text-red-600 bg-red-50 border border-red-200 px-3 py-1 rounded-full">⚠ ${p.escalatedCount} Escalated (&gt;3d)</span>` : ''}
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                ${planKpiCard(p.avgAll.toFixed(1)+'d','Avg. Approval Time (Raise → Final Auth)','#1f2937')}
                ${planKpiCard(p.escalatedCount,'Escalated MRs (&gt;3d in stage)','#DC2626')}
            </div>
            ${p.deptAvg.length ? `
            <table class="w-full text-[11px]">
                <thead><tr class="text-slate-400 uppercase text-[9px] font-black text-left">
                    <th class="py-1 font-black">Department</th><th class="py-1 text-right font-black">Avg. Approval Time</th><th class="py-1 text-right font-black">MRs</th>
                </tr></thead>
                <tbody>${p.deptAvg.map(d => `<tr class="border-t border-rule"><td class="py-1.5 font-bold">${esc(d.dept)}</td><td class="py-1.5 text-right">${d.avg.toFixed(1)} days</td><td class="py-1.5 text-right text-slate-400">${d.count}</td></tr>`).join('')}</tbody>
            </table>` : `<p class="text-xs text-slate-400 text-center py-3">No authorized MRs yet to compute department KPIs.</p>`}
        </div>`;
    }

    function renderStatusBadge(status) {
        const m = STATUS_META[status] || { label: status, color: '#666', bg: '#eee' };
        return `<span class="status-chip" style="background:${m.bg};color:${m.color};border-color:${m.color}33">
            <span class="dot" style="background:${m.color}"></span>${m.label}
        </span>`;
    }
    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Debounced re-render for live search / filter fields — avoids hang on every keystroke
    // and restores focus + cursor after the DOM is rebuilt.
    let _softRenderTimer = null;
    let _isSoftRender = false;
    let _pendingFocus = null;
    let _lastRenderedTab = null; // used to preserve main scroll when re-rendering the same tab
    let _lastRenderedSection = null; // planner sub-section (overview / queue / merge_pr)

    function captureFocusForRestore() {
        if (_pendingFocus && _pendingFocus.explicit) return; const el = document.activeElement;
        if (!el || !/^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)) { _pendingFocus = null; return; }
        _pendingFocus = {
            id: el.id || '',
            fk: el.getAttribute('data-focus-key') || '',
            start: typeof el.selectionStart === 'number' ? el.selectionStart : null,
            end: typeof el.selectionEnd === 'number' ? el.selectionEnd : null
        };
    }

    function restoreFocusAfterRender() {
        if (!_pendingFocus) return;
        const pf = _pendingFocus;
        _pendingFocus = null;
        let el = pf.id ? document.getElementById(pf.id) : null;
        if (!el && pf.fk) el = document.querySelector('[data-focus-key="' + pf.fk.replace(/"/g, '\\"') + '"]');
        if (!el) return;
        el.focus({ preventScroll: true });
        if (pf.start !== null && el.setSelectionRange) {
            try { el.setSelectionRange(pf.start, pf.end); } catch (e) {}
        }
    }

    function softRender() {
        if (_softRenderTimer) clearTimeout(_softRenderTimer);
        _softRenderTimer = setTimeout(() => {
            _softRenderTimer = null;
            captureFocusForRestore();
            _isSoftRender = true;
            try { render(); } finally { _isSoftRender = false; }
            requestAnimationFrame(restoreFocusAfterRender);
        }, 180);
    }

    function tokenize(q) { return String(q||'').trim().toLowerCase().split(/\s+/).filter(Boolean); }

    // Multi-keyword AND search across every meaningful field on an MR,
    // including every line item's name / spec / make / project.
    function matchesKeyword(mr, q) {
        const tokens = tokenize(q);
        if (!tokens.length) return true;
        const hay = [
            mr.mrNumber, mr.dept, mr.raisedBy, mr.status, (STATUS_META[mr.status]||{}).label,
            mr.notes, mr.poNumber,
            ...(mr.items||[]).flatMap(it => [it.name, it.spec, it.make, it.project, it.unit])
        ].filter(Boolean).join(' ').toLowerCase();
        return tokens.every(t => hay.includes(t));
    }

    function filterMrs(list, f) {
        return list.filter(m => {
            if (f.status && getMrDisplayStatus(m) !== f.status) return false;
            if (f.dept && m.dept !== f.dept) return false;
            if (f.project && !(m.items||[]).some(it => it.project === f.project)) return false;
            if (f.from && m.createdAt < new Date(f.from).getTime()) return false;
            if (f.to && m.createdAt > new Date(f.to).getTime() + 86399999) return false;
            if (f.q && !matchesKeyword(m, f.q)) return false;
            return true;
        });
    }

    // Legacy names used for read-only preview in forms; issue numbers via consumeNext* only.
    function generateMrNumber() { return peekNextMrNumber(); }
    function generatePrNumber() { return peekNextPrNumber(); }

    // MRs eligible to combine into one shared PR (multi-department → single procurement load).
    function isMergeEligibleMr(mr) {
        return mr && mr.status === 'AUTHORIZED' && !mr.prNumber && mr.source !== 'DIRECT_PR';
    }
    function getMergeEligibleMrs() {
        return (appData.mrs || []).filter(isMergeEligibleMr).sort((a, b) => b.createdAt - a.createdAt);
    }

    function uniqueDepts() {
        const master = departmentNames();
        if (master.length) return master;
        return Array.from(new Set(appData.mrs.map(m => m.dept).filter(Boolean))).sort();
    }

    // Only Admin, Planner, Authorizer, and Procurement may view MR data across departments.
    // All other users (Creators, L1, L2, etc.) see only their own department's MRs.
    const CROSS_DEPT_MR_ROLES = new Set(['admin', 'planner', 'authorizer', 'procurement']);

    function canSeeAllDepartmentMrs() {
        return !!(user && CROSS_DEPT_MR_ROLES.has(user.role));
    }

    function filterMrsByUserScope(mrs) {
        if (!user) return [];
        if (canSeeAllDepartmentMrs()) return mrs || [];
        const dept = (user.dept || '').trim();
        if (!dept) return [];
        return (mrs || []).filter(m => (m.dept || '').trim() === dept);
    }

        if (!mr || !user) return false;

    // ── DEPARTMENT APPROVAL ROUTING HELPERS ──────────────────────────────────
    // Finds the (first) active L2 approver in a given department — this is the automatic
    // routing required by the Department Approval Level Workflow. No manual selection.
    function findDeptL2(dept) {
        return (appData.users || []).find(u => u.active && u.dept === dept && u.approvalLevel === 'L2');
    }

    // Direct PR is raised by Planning (planner/admin). When the Planning department has L1/L2
    // users, L1-raised Direct PRs must go through Planning L2 before Final Authorization.
    function directPrUsesPlanningL2Chain(u) {
        if (!u) return false;
        if (u.role === 'planner') return true;
        if (u.role === 'admin') {
            return (appData.users || []).some(x => x.active && x.dept === u.dept && x.role === 'planner');
        }
        return false;
    }

    function applyDirectPrRouting(mr, notes) {
        mr.source = 'DIRECT_PR';
        mr.plannedBy = user.name;
        mr.l1User = user.name;
        mr.l2User = mr.l2User || '';

        const creatorLevel = user.approvalLevel || 'L1';
        let actionLabel = 'Direct PR Raised (Planner)';
        let pendingNote = ' — sent for Final Authorization.';
        
        const docNum = mr.prNumber || mr.mrNumber || '';

        if (creatorLevel === 'L1') {
            const l2 = findDeptL2(user.dept);
            if (l2) {
                mr.status = 'DEPT_APPROVAL_PENDING';
                mr.l2User = l2.name;
                actionLabel += ' — Pending Planning L2 Approval';
                pendingNote = ' — sent to Planning L2 for approval.';
                pushNotification({ dept: user.dept, level: 'L2' }, `Direct PR ${docNum} from ${user.name} (${user.dept}) is pending your Planning L2 approval.`, mr.id);
            } else {
                mr.status = 'RAISED';
                actionLabel += ' — Pending Final Authorization';
                pushNotification({ level: 'FINAL_AUTH' }, `Direct PR ${docNum} from ${user.name} (${user.dept}) is pending Final Authorization.`, mr.id);
            }
        } else {
            mr.status = 'RAISED';
            actionLabel += ' — Pending Final Authorization';
            pushNotification({ level: 'FINAL_AUTH' }, `Direct PR ${docNum} from ${user.name} (${user.dept}) is pending Final Authorization.`, mr.id);
        }

        mr.history.push({ action: actionLabel, actor: user.name, role: user.role, dept: user.dept, ts: Date.now(), note: notes });
        return pendingNote;
    }

    // ── NOTIFICATIONS ─────────────────────────────────────────────────────────
    // Lightweight in-app notification log, addressed either to everyone at a given Approval
    // Level within a specific Department (e.g. "Electrical · L2"), or to everyone holding a
    // given Approval Level system-wide (e.g. every Final Authorization user). Since this app
    // has no server/email layer, this is the notification mechanism: counters update the
    // instant the underlying data changes, for every user who matches the target.
    function pushNotification(target, message, mrId) {
        appData.notifications = appData.notifications || [];
        appData.notifications.push({ id: 'ntf-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), target, message, mrId, ts: Date.now(), readBy: [] });
    }
    function notifMatchesUser(n, u) {
        if (!n.target) return false;
        if (n.target.userId) return n.target.userId === u.id;
        if (n.target.level && n.target.level !== (u.approvalLevel || 'L1')) return false;
        if (n.target.dept && n.target.dept !== u.dept) return false;
        return true;
    }
    function myNotifications() {
        return (appData.notifications || []).filter(n => notifMatchesUser(n, user)).sort((a,b) => b.ts - a.ts);
    }
    function myUnreadNotifications() {
        return myNotifications().filter(n => !(n.readBy||[]).includes(user.id));
    }

    function computeStats(list) {
        const items = list.reduce((a,m) => a + ((m.items||[]).length), 0);
        const qty   = list.reduce((a,m) => a + ((m.items||[]).reduce((s,it) => s + (Number(it.qty)||0), 0)), 0);
        const closed = list.filter(m => getMrDisplayStatus(m) === 'CLOSED');
        const open  = list.length - closed.length;
        let avgDays = 0;
        if (closed.length) {
            const totalDays = closed.reduce((sum,m) => {
                const closeEvt = (m.history||[]).slice().reverse().find(h => (h.action||'').toLowerCase().includes('closed'));
                const end = closeEvt ? closeEvt.ts : m.createdAt;
                return sum + Math.max(0, (end - m.createdAt) / 86400000);
            }, 0);
            avgDays = (totalDays / closed.length).toFixed(1);
        }
        return { total: list.length, items, qty, closed: closed.length, open, avgDays };
    }

    function playLoginSuccessSound() {
        try {
            const ctx = getLoginAudioCtx();
            if (!ctx) return;
            if (ctx.state === 'suspended') ctx.resume();
            const t = ctx.currentTime;
            [[523.25, 0.11, 0], [659.25, 0.1, 0.1], [783.99, 0.09, 0.2], [1046.5, 0.07, 0.32]].forEach(([freq, vol, delay]) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t + delay);
                gain.gain.setValueAtTime(0.0001, t + delay);
                gain.gain.exponentialRampToValueAtTime(vol, t + delay + 0.025);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + delay + 0.45);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t + delay);
                osc.stop(t + delay + 0.5);
            });
            const click = ctx.createOscillator();
            const clickGain = ctx.createGain();
            click.type = 'triangle';
            click.frequency.setValueAtTime(180, t + 0.05);
            click.frequency.exponentialRampToValueAtTime(90, t + 0.15);
            clickGain.gain.setValueAtTime(0.0001, t + 0.05);
            clickGain.gain.exponentialRampToValueAtTime(0.06, t + 0.07);
            clickGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
            click.connect(clickGain);
            clickGain.connect(ctx.destination);
            click.start(t + 0.05);
            click.stop(t + 0.22);
        } catch (e) { /* audio optional */ }
    }

    function playLoginFailSound() {
        try {
            const ctx = getLoginAudioCtx();
            if (!ctx) return;
            if (ctx.state === 'suspended') ctx.resume();
            const t = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(220, t);
            osc.frequency.exponentialRampToValueAtTime(160, t + 0.2);
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(0.04, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(t);
            osc.stop(t + 0.28);
        } catch (e) { /* audio optional */ }
    }

        if (!v) return null;

        if (!proj) proj = (appData.projects || []).find(p => (p.ccNo || '').trim().toLowerCase() === v.toLowerCase());
        if (!proj) {
            const vl = v.toLowerCase();
            proj = (appData.projects || []).find(p =>
                p.name.toLowerCase().includes(vl) || String(p.ccNo || '').toLowerCase().includes(vl)
            );
        }
        return proj || null;
    }

    window.onProjectInput = (rowId, val) => {
        const item = currentMrItems.find(i => i.id == rowId);
        if (!item) return;
        const proj = resolveProjectInput(val);
        item.project = proj ? proj.name : val;
        softRender();
    };

    window.onProjectChange = (rowId, val) => {
        const item = currentMrItems.find(i => i.id == rowId);
        if (!item) return;
        const proj = resolveProjectInput(val);
        item.project = proj ? proj.name : String(val || '').trim();
        softRender();
    };

    window.onDeliveryLocationChange = (val) => { mrDeliveryLocation = val; };

    // Reads whatever is currently typed into the on-screen MR item rows back into
    // currentMrItems. Used by Submit, Save Draft, and Import so none of them ever act on
    // stale in-memory values while the user is still typing.
    function harvestMrItemsFromDom() {
        currentMrItems.forEach(item => {
            const specEl  = document.getElementById('spec-'  + item.id);
            const makeEl  = document.getElementById('make-'  + item.id);
            const spEl    = document.getElementById('sp-'    + item.id);
            const qtyEl   = document.getElementById('qty-'   + item.id);
            const unitEl  = document.getElementById('unit-'  + item.id);
            const rateEl  = document.getElementById('rate-'  + item.id);
            const projEl  = document.getElementById('proj-'  + item.id);
            const dateEl  = document.getElementById('date-'  + item.id);
            const remEl   = document.getElementById('rem-'   + item.id);
            if (specEl)  item.spec         = specEl.value;
            if (makeEl)  item.make         = makeEl.value;
            if (spEl)    item.sampleProvided = spEl.value;
            if (qtyEl)   item.qty          = parseFloat(qtyEl.value) || 1;
            if (unitEl)  item.uom          = unitEl.value;
            if (rateEl)  item.rate         = parseFloat(rateEl.value) || 0;
            if (projEl)  item.project      = projEl.value;
            if (dateEl)  item.requiredDate = dateEl.value;
            if (remEl)   item.remarks      = remEl.value;
        });
    }

    // ── MR: DUPLICATE ITEM / BULK DELETE EMPTY ROWS ───────────────────────
    window.duplicateMrRow = (rowId) => {
        harvestMrItemsFromDom();
        const idx = currentMrItems.findIndex(i => i.id == rowId);
        if (idx < 0) return;
        const clone = { ...currentMrItems[idx], id: Date.now() + Math.random() };
        currentMrItems.splice(idx + 1, 0, clone);
        render();
    };
    window.bulkDeleteEmptyMrRows = () => {
        harvestMrItemsFromDom();
        const kept = currentMrItems.filter(it => (it.assetName || '').trim());
        if (!kept.length) { alert('At least one row is required.'); return; }
        if (kept.length === currentMrItems.length) { showToast('No empty rows to remove'); return; }
        currentMrItems = kept;
        render();
    };

    // ── MR: DUPLICATE ITEM DETECTION (same item + project within this MR) ─
    function findDuplicateMrItemPairs() {
        const seen = new Map();
        const dupes = [];
        currentMrItems.forEach((it, i) => {
            const key = `${(it.assetName||'').trim().toLowerCase()}|${(it.project||'').trim().toLowerCase()}`;
            if (!key.trim().replace('|','')) return;
            if (seen.has(key)) dupes.push({ a: seen.get(key)+1, b: i+1, name: it.assetName });
            else seen.set(key, i);
        });
        return dupes;
    }

    // ── MR: BUDGET CHECK (committed spend vs Project Master's optional Budget) ─
    function computeMrBudgetCheck() {
        const byProject = {};
        currentMrItems.forEach(it => {
            const proj = (it.project || '').trim();
            if (!proj) return;
            byProject[proj] = (byProject[proj] || 0) + ((Number(it.qty)||0) * (Number(it.rate)||0));
        });
        const editingId = currentEditRevisionId;
        return Object.entries(byProject).map(([proj, thisAmt]) => {
            const p = (appData.projects || []).find(x => x.name === proj);
            if (!p || !p.budget) return null;
            const priorAmt = appData.mrs
                .filter(m => m.id !== editingId)
                .reduce((s, m) => s + (m.items||[]).filter(it => it.project === proj)
                    .reduce((s2, it) => s2 + ((Number(it.qty)||0) * (Number(it.rate)||0)), 0), 0);
            const total = priorAmt + thisAmt;
            return { project: proj, thisAmt, priorAmt, total, budget: Number(p.budget), pct: total / Number(p.budget) * 100 };
        }).filter(Boolean);
    }
    function renderMrBudgetCheckBanner() {
        const rows = computeMrBudgetCheck();
        if (!rows.length) return '';
        return `
        <tr class="no-print">
            <td colspan="12" style="border:1px solid #cbd5e1; background:#fffbeb; padding:8px;">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#92400e;letter-spacing:0.05em;margin-bottom:4px;">Budget Check</div>
                ${rows.map(r => `<div style="font-size:11px;margin-bottom:2px;">
                    <b>${esc(r.project)}</b> — this MR: ₹${r.thisAmt.toLocaleString('en-IN',{maximumFractionDigits:0})}, project total incl. other MRs: ₹${r.total.toLocaleString('en-IN',{maximumFractionDigits:0})} of ₹${r.budget.toLocaleString('en-IN',{maximumFractionDigits:0})} budget —
                    <span style="font-weight:800;color:${r.pct>100?'#B91C1C':(r.pct>80?'#B45309':'#047857')}">${r.pct.toFixed(0)}%${r.pct>100?' OVER BUDGET':''}</span>
                </div>`).join('')}
            </td>
        </tr>`;
    }

    // ── MR: SAVE DRAFT / LOAD DRAFT ───────────────────────────────────────
    // A draft is a snapshot of currentMrItems + the delivery location + notes, keyed to the
    // logged-in user. It never touches appData.mrs / MR numbering — only becomes a real MR
    // once the user opens it back up and clicks Submit.
    window.saveMrDraft = () => {
        harvestMrItemsFromDom();
        const noteEl = document.getElementById('mr-overall-notes');
        const notes = noteEl ? noteEl.value : '';
        const draft = {
            id: 'DRAFT-' + Date.now(),
            savedBy: user.name,
            dept: user.dept,
            savedAt: Date.now(),
            deliveryLocation: mrDeliveryLocation,
            notes,
            items: currentMrItems.map(it => ({ ...it })),
            isDirectPR: !!isDirectPR
        };
        appData.mrDrafts = appData.mrDrafts || [];
        appData.mrDrafts.push(draft);
        saveDB();
        showToast('Draft saved');
    };
    window.toggleMrDraftsPanel = (show) => { showMrDraftsPanel = show; render(); };
    window.loadMrDraft = (draftId) => {
        const d = (appData.mrDrafts || []).find(x => x.id === draftId);
        if (!d) return;
        currentMrItems = d.items.map(it => ({ ...it, id: Date.now() + Math.random() }));
        mrDeliveryLocation = d.deliveryLocation || '';
        isDirectPR = !!d.isDirectPR;
        currentEditRevisionId = null;
        showMrDraftsPanel = false;
        render();
        setTimeout(() => { const el = document.getElementById('mr-overall-notes'); if (el) el.value = d.notes || ''; }, 0);
    };
    window.deleteMrDraft = (draftId) => {
        if (!confirm('Delete this draft?')) return;
        appData.mrDrafts = (appData.mrDrafts || []).filter(x => x.id !== draftId);
        saveDB();
        render();
    };
    function renderMrDraftsPanel() {
        if (!showMrDraftsPanel) return '';
        const mine = (appData.mrDrafts || []).filter(d => d.savedBy === user.name).sort((a,b) => b.savedAt - a.savedAt);
        return `
        <div class="fixed inset-0 bg-ink/70 backdrop-blur-sm z-[1000] flex items-center justify-center p-4 no-print" style="position:fixed;inset:0;background:rgba(11,20,32,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
                <div class="px-8 py-6 border-b border-rule flex justify-between items-center bg-paper/60">
                    <h2 class="text-lg font-display font-bold uppercase tracking-widest">My Drafts (${mine.length})</h2>
                    <button onclick="window.toggleMrDraftsPanel(false)" class="text-slate-400 bg-white p-1 border border-rule rounded-lg hover:text-brand"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-6 space-y-3 max-h-[60vh] overflow-y-auto">
                    ${mine.length === 0 ? `<p class="text-xs text-slate-400 text-center py-8">No saved drafts yet.</p>` : mine.map(d => `
                    <div class="border border-rule rounded-xl p-4 flex items-center justify-between gap-3">
                        <div>
                            <p class="text-xs font-black">${d.items.length} item(s)${d.isDirectPR ? ' · Direct PR' : ''}</p>
                            <p class="text-[10px] text-slate-400">Saved ${fmtDateTime(d.savedAt)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.loadMrDraft('${d.id}')" class="bg-ink text-white text-[10px] font-black uppercase px-3 py-2 rounded-lg hover:bg-black">Open</button>
                            <button onclick="window.deleteMrDraft('${d.id}')" class="border border-rule text-slate-400 text-[10px] font-black uppercase px-3 py-2 rounded-lg hover:text-brand">Delete</button>
                        </div>
                    </div>`).join('')}
                </div>
            </div>
        </div>`;
    }

    // ── MR: EXCEL IMPORT OF LINE ITEMS ────────────────────────────────────
    // Reads a spreadsheet (Item / Specification / Make / Qty / Unit / Rate / Project /
    // Required Date / Remarks — column names matched case-insensitively) and appends each
    // row as a new MR line item, auto-filling Asset ID / spec from the Asset Master when
    // the item name matches, exactly like typing it in by hand.
    window.importMrItemsFromExcel = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx,.xls,.csv';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const wb = XLSX.read(ev.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                    const norm = (r) => {
                        const out = {};
                        Object.keys(r).forEach(k => out[k.trim().toLowerCase()] = r[k]);
                        return out;
                    };
                    const pick = (n, keys) => { for (const k of keys) if (n[k] !== undefined && n[k] !== '') return n[k]; return ''; };
                    const imported = rows.map(r => {
                        const n = norm(r);
                        const assetName = String(pick(n, ['item','asset','asset name','item name'])).trim();
                        if (!assetName) return null;
                        const asset = appData.assets.find(a => (a.name || "").trim().toLowerCase() === assetName.toLowerCase());
                        const qty = parseFloat(pick(n, ['qty','quantity'])) || 1;
                        const rate = parseFloat(pick(n, ['rate','price'])) || 0;
                        let reqDate = pick(n, ['required date','requireddate','tentative require date','req date']);
                        if (reqDate instanceof Date) reqDate = fmtDateInput(reqDate.getTime());
                        return {
                            id: Date.now() + Math.random(),
                            assetId: asset ? asset.id : '',
                            assetName,
                            spec: String(pick(n, ['specification','spec']) || (asset ? asset.specification : '') || ''),
                            make: String(pick(n, ['make','brand']) || ''),
                            sampleProvided: String(pick(n, ['sample provided','sample'])) || '',
                            qty, uom: String(pick(n, ['unit','uom']) || (asset ? asset.unit : 'NOS') || 'NOS'),
                            rate,
                            project: String(pick(n, ['project','project name']) || ''),
                            requiredDate: String(reqDate || ''),
                            remarks: String(pick(n, ['remarks','comments']) || '')
                        };
                    }).filter(Boolean);
                    if (!imported.length) { alert('No valid rows found. Make sure the sheet has an "Item" column.'); return; }
                    const wasBlank = currentMrItems.length === 1 && !currentMrItems[0].assetName;
                    currentMrItems = wasBlank ? imported : [...currentMrItems, ...imported];
                    render();
                    showToast(`Imported ${imported.length} item(s)`);
                } catch(err) { alert('Import failed: ' + err.message); }
            };
            reader.readAsBinaryString(file);
        };
        input.click();
    };

    window.submitMR = () => {
        harvestMrItemsFromDom();

        if (currentMrItems.some(i => !i.assetName)) { alert("Please enter an item for every row."); return; }
        if (currentMrItems.some(i => !i.project))   { alert("Please set a Cost Centre for every row."); return; }
        if (currentMrItems.some(i => !i.requiredDate)) { alert("Please set a tentative require date for every row."); return; }
        if (currentMrItems.some(i => !i.qty || Number(i.qty) <= 0)) { alert("Please enter a valid quantity greater than 0 for every row."); return; }

        const dupes = findDuplicateMrItemPairs();
        if (dupes.length) {
            const msg = dupes.map(d => `Row ${d.a} and Row ${d.b} — "${d.name}"`).join('\n');
            if (!confirm(`This MR has duplicate items for the same project:\n\n${msg}\n\nSubmit anyway?`)) return;
        }

        const noteEl = document.getElementById('mr-overall-notes');
        const notes  = noteEl ? noteEl.value : "";
        const isRevision = !!currentEditRevisionId;
        const mrId   = isRevision ? currentEditRevisionId : `MR-${Date.now()}`;

        let mr;
        if (isRevision) {
            mr = appData.mrs.find(m => m.id === currentEditRevisionId);
            mr.revNo = (mr.revNo || 0) + 1;
        } else {
            const mrNum = isDirectPR ? null : consumeNextMrNumber();
            const prNum = isDirectPR ? consumeNextPrNumber() : null;
            mr = { id: mrId, mrNumber: mrNum, prNumber: prNum, revNo: 0, createdAt: Date.now(), history: [] };
        }

        mr.status     = 'RAISED';
        mr.dept       = user.dept;
        mr.raisedBy   = user.name;
        mr.deliveryLocation = mrDeliveryLocation;
        mr.notes      = notes;
        mr.items      = currentMrItems.map(it => {
            const rate = Number(it.rate) || 0, qty = Number(it.qty) || 1;
            return {
                name: it.assetName, spec: it.spec || "", make: it.make || "", sampleProvided: it.sampleProvided || "",
                qty, unit: it.uom || "NOS", rate, amount: +(qty * rate).toFixed(2),
                project: it.project || "", requiredDate: it.requiredDate || "", remarks: it.remarks || "", total: 0,
                receivedQty: 0, refMrNumber: isRevision ? (it.refMrNumber || mr.mrNumber) : ""
            };
        });

        if (isDirectPR && !isRevision) {
            const pendingNote = applyDirectPrRouting(mr, notes);
            if (!isRevision) appData.mrs.push(mr);
            (mr.items || []).forEach(it => { if (!it.refMrNumber) it.refMrNumber = mr.prNumber || mr.mrNumber; });
            saveDB();
            const wantsPrint = confirm(
                "Direct PR " + (isRevision ? "Revised" : "Raised") + " successfully: " + (mr.prNumber || mr.mrNumber) + pendingNote +
                "\n\nDo you want to print this PR now?"
            );
            activeTab = 'planner';
            isDirectPR = false;
            if (wantsPrint) { assignPrintForMr(mr); }
            render();
            return;
        } else {
            if (!isRevision) mr.source = 'MR_BASED';
            mr.l1User = user.name;
            mr.l2User = mr.l2User || '';

            // ── Department Approval Level routing (mandatory) ───────────────────────────
            // Approval logic is always based on both Department and Approval Level.
            // • Creator is L1  → look for an active L2 approver in the SAME department.
            //     - Found     → route to Department Approval Pending, auto-assigned to that L2 user.
            //     - Not found → skip Department Approval entirely, go straight to Final
            //                   Authorization Pending (unchanged legacy behaviour).
            // • Creator is L2 or above → they already sit at/above department approval, so the
            //     MR goes straight to Final Authorization Pending, same as today.
            const creatorLevel = user.approvalLevel || 'L1';
            let actionLabel = isRevision ? "Revised & Resubmitted" : "Raised";
            if (isRevision) {
                mr.status = 'RAISED';
                pushNotification({ level: 'FINAL_AUTH' }, `MR ${mr.mrNumber} revised and resubmitted — pending review.`, mr.id);
            } else if (creatorLevel === 'L1') {
                const l2 = findDeptL2(user.dept);
                if (l2) {
                    mr.status = 'DEPT_APPROVAL_PENDING';
                    mr.l2User = l2.name;
                    actionLabel += " — Pending Department Approval";
                    pushNotification({ dept: user.dept, level: 'L2' }, `New MR ${mr.mrNumber} from ${user.name} (${user.dept}) is pending your Department Approval.`, mr.id);
                } else {
                    pushNotification({ level: 'FINAL_AUTH' }, `MR ${mr.mrNumber} from ${user.name} (${user.dept}) is pending Final Authorization.`, mr.id);
                }
            } else {
                pushNotification({ level: 'FINAL_AUTH' }, `MR ${mr.mrNumber} from ${user.name} (${user.dept}) is pending Final Authorization.`, mr.id);
            }

            mr.history.push({ action: actionLabel, actor: user.name, role: user.role, dept: user.dept, ts: Date.now(), note: notes });
        }

        if (!isRevision) appData.mrs.push(mr);
        (mr.items || []).forEach(it => { if (!it.refMrNumber) it.refMrNumber = mr.mrNumber; });
        saveDB();
        const wantsPrint = confirm(
            (isDirectPR ? "Direct PR" : "MR") + " " + (isRevision ? "Revised" : "Raised") + " successfully: " + mr.mrNumber +
            "\n\nDo you want to print this " + (isDirectPR ? "PR" : "MR") + " now?"
        );
        activeTab = isDirectPR ? 'planner' : 'dashboard';
        isDirectPR = false;
        if (wantsPrint) { assignPrintForMr(mr); }
        render();
    };

    window.resolveQuery = (id) => {
        const mr = appData.mrs.find(m => m.id === id);
        if (!mr) return;
        if (!userCanAccessMr(mr)) { alert('This MR belongs to another department.'); return; }
        currentEditRevisionId = id;
        mrDeliveryLocation = mr.deliveryLocation || "Indus House";
        currentMrItems = mr.items.map((it, idx) => ({
            id: Date.now() + idx, assetName: it.name, assetId: "", spec: it.spec || "", make: it.make || "",
            sampleProvided: it.sampleProvided || "", qty: it.qty || 1, uom: it.unit || "NOS", rate: it.rate || 0,
            project: it.project || "", requiredDate: it.requiredDate || "", remarks: it.remarks || ""
        }));
        activeTab = 'new_mr';
        render();
    };

    // Once both PO Number and PO Date exist on an item, that item's status auto-advances to
    // "PO Given" — no manual selection needed or allowed. Safe to call after any edit to either
    // field on that item; it's a no-op otherwise. Each item on a PR now has its own PO, so this
    // runs per item rather than once for the whole PR.
    function checkAutoPoGiven(mr, item) {
        const alreadyPast = ['PARTIAL', 'CLOSED', 'CANCELLED'].includes(item.status);
        if (item.poNumber && item.poDate && item.status !== 'PROCUREMENT' && !alreadyPast) {
            const oldStatus = item.status;
            item.status = 'PROCUREMENT';
            mr.history = mr.history || [];
            mr.history.push({ action: 'PO Given (Auto)', actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field: 'status', oldValue: STATUS_META[oldStatus]?.label || oldStatus, newValue: STATUS_META.PROCUREMENT.label,
                note: `${item.name || 'Item'} — PO ${item.poNumber} dated ${fmtDate(new Date(item.poDate).getTime())} — status auto-updated.` });
            return true;
        }
        return false;
    }

    // Which statuses a given current status is allowed to move to manually. PROCUREMENT ("PO Given")
    // never appears as a manual pre-PO choice — see PRE_PO_STATUSES / checkAutoPoGiven above.
    function dcAllowedStatuses(current) {
        if (current === 'CANCELLED') return ['CANCELLED'];
        if (current === 'HOLD')      return ['HOLD', 'PROCUREMENT', 'PARTIAL', 'CLOSED', 'CANCELLED'];
        if (POST_PO_STATUSES.includes(current)) return ['PROCUREMENT', 'PARTIAL', 'CLOSED', 'HOLD', 'CANCELLED'];
        return PRE_PO_STATUSES;
    }

    // Data Centre only ever shows PRs (i.e. MRs that already cleared Planning Approval), so the
    // status choices offered there are limited to the 5 allowed post-PR-generation statuses:
    // PO Given, Partial Received, Received, Hold, Cancel. "PLANNED" is only ever the automatic
    // starting point before a PO exists — it is shown but cannot be manually re-selected.
    function dcStatusOptions(current) {
        if (current === 'CANCELLED') return ['CANCELLED'];
        if (current === 'HOLD')      return ['HOLD', 'PROCUREMENT', 'PARTIAL', 'CLOSED', 'CANCELLED'];
        if (POST_PO_STATUSES.includes(current)) return ['PROCUREMENT', 'PARTIAL', 'CLOSED', 'HOLD', 'CANCELLED'];
        return ['PLANNED', 'HOLD', 'CANCELLED'];
    }

    window.updateMrStatus = (id, newStatus, actionLabel, noteInputId) => {
        const noteEl = noteInputId ? document.getElementById(noteInputId) : null;
        const note   = noteEl ? noteEl.value : "";
        const mr     = appData.mrs.find(m => m.id === id);
        if (mr) {
            if (!dcAllowedStatuses(mr.status).includes(newStatus)) {
                alert("This PR has already moved past PO Given and cannot be sent back to an earlier stage.");
                return;
            }
            const oldStatus = mr.status;
            mr.status = newStatus;

            // Record structured Final Authorization audit fields the moment an MR clears
            // Final Authorization, and notify Planning per the mandatory notification rules.
            if (newStatus === 'AUTHORIZED') {
                mr.finalAuthUser = user.name;
                mr.authorizationDate = Date.now();
                pushNotification({ level: 'PLANNING' }, `MR ${mr.mrNumber} authorized — pending Planning.`, mr.id);
            }

            // Planning Approval is the moment an MR is converted into a PR — generate the
            // permanent PR number here, exactly once, and record the MR ⇄ PR mapping.
            let prNote = note;
            let prJustGenerated = false;
            if (newStatus === 'PLANNED' && !mr.prNumber) {
                mr.prNumber = consumeNextPrNumber();
                mr.plannedBy = mr.plannedBy || user.name;
                mr.planningDate = Date.now();
                (mr.items || []).forEach(it => {
                    it.refMrNumber = mr.mrNumber;
                    if (!it.status || !['PROCUREMENT','PARTIAL','CLOSED','HOLD','CANCELLED'].includes(it.status)) it.status = 'PLANNED';
                });
                prNote = (note ? note + ' — ' : '') + `PR Generated: ${mr.mrNumber} → ${mr.prNumber}`;
                pushNotification({ level: 'PROCUREMENT' }, `PR ${mr.prNumber} generated from ${mr.mrNumber} — pending Procurement.`, mr.id);
                prJustGenerated = true;
            }

            mr.history.push({ action: actionLabel, actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field: 'status', oldValue: STATUS_META[oldStatus]?.label || oldStatus, newValue: STATUS_META[newStatus]?.label || newStatus,
                note: prNote });

            // A Direct PR was already "planned" by the Planner at creation time, so once it
            // clears Authorization it auto-advances straight to Planned/PR-Generated instead of
            // sitting in a separate Planning Approval queue.
            if (newStatus === 'AUTHORIZED' && mr.source === 'DIRECT_PR') {
                if (!mr.prNumber) mr.prNumber = consumeNextPrNumber();
                mr.status = 'PLANNED';
                (mr.items || []).forEach(it => {
                    it.refMrNumber = mr.mrNumber;
                    if (!it.status || !['PROCUREMENT','PARTIAL','CLOSED','HOLD','CANCELLED'].includes(it.status)) it.status = 'PLANNED';
                });
                mr.history.push({ action: "Planning Approved (Auto — Direct PR)", actor: mr.plannedBy || user.name, role: 'planner', dept: user.dept, ts: Date.now(),
                    field: 'status', oldValue: STATUS_META.AUTHORIZED.label, newValue: STATUS_META.PLANNED.label,
                    note: `PR Generated: ${mr.mrNumber} → ${mr.prNumber}` });
                prJustGenerated = true;
            }

            saveDB();

    function assetIdPrefixFromName(name) {
        const stop = new Set(['a', 'an', 'the', 'of', 'for', 'and', 'or', 'with', 'to', 'in', 'on']);
        const words = String(name || '').trim().split(/\s+/).filter(w => {
            const lw = w.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
            return lw.length > 0 && !stop.has(lw);
        });
        let prefix = '';
        if (words.length >= 2) {
            prefix = words.slice(0, 3).map(w => w.replace(/[^a-zA-Z0-9]/g, '').charAt(0)).join('').toUpperCase();
        } else if (words.length === 1) {
            prefix = words[0].replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 3);
        }
        if (prefix.length < 2) {
            prefix = String(name || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 3) || 'AST';
        }
        return prefix.slice(0, 4);
    }

    function generateAssetId(name, assets, extraIds) {
        const prefix = assetIdPrefixFromName(name);
        const allIds = new Set((assets || []).map(a => String(a.id || '').toUpperCase()));
        (extraIds || []).forEach(id => allIds.add(String(id).toUpperCase()));
        const re = new RegExp('^' + prefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '-(\\d+)$', 'i');
        let maxNum = 0;
        allIds.forEach(id => {
            const m = String(id).match(re);
            if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
        });
        let n = maxNum + 1;
        let candidate;
        do {
            candidate = prefix + '-' + String(n).padStart(3, '0');
            n++;
        } while (allIds.has(candidate.toUpperCase()) && n < 100000);
        return candidate;
    }

    function normalizeAssetUnit(unit) {
        const u = String(unit || 'NOS').trim().toUpperCase();
        const map = { 'NUMBER': 'NOS', 'NUMBERS': 'NOS', 'NO': 'NOS', 'NOS.': 'NOS', 'PCS': 'NOS', 'PC': 'NOS', 'PIECE': 'NOS', 'PIECES': 'NOS', 'METER': 'MTR', 'METERS': 'MTR', 'METRE': 'MTR', 'KG.': 'KG', 'KGS': 'KG', 'LITRE': 'LTR', 'LITER': 'LTR', 'LITRES': 'LTR', 'BOXES': 'BOX' };
        return map[u] || u || 'NOS';
    }

    function normalizeImportKeys(row) {
        const norm = {};
        Object.entries(row || {}).forEach(([k, v]) => {
            norm[String(k).trim().toLowerCase().replace(/\s+/g, ' ')] = v;
        });
        return norm;
    }

    function pickImportVal(norm, aliases) {
        for (const alias of aliases) {
            const val = norm[alias.toLowerCase()];
            if (val !== undefined && val !== null && String(val).trim() !== '') return String(val).trim();
        }
        return '';
    }

    function parseAssetImportRow(r) {
        const norm = normalizeImportKeys(r);
        const id = pickImportVal(norm, ['asset id', 'id', 'assetid', 'asset code', 'code', 'asset no', 'asset no.']);
        const name = pickImportVal(norm, ['asset name', 'name', 'asset', 'item name', 'item', 'description', 'material name']);
        const specification = pickImportVal(norm, ['specification', 'spec', 'specifications', 'details', 'detail', 'item specification']);
        const unit = normalizeAssetUnit(pickImportVal(norm, ['unit (uom)', 'unit', 'uom', 'unit of measure', 'units', 'uom/unit']) || 'NOS');
        return { id, name, specification, unit };
    }

    function importAssetsFromRows(rows) {
        appData.assets = appData.assets || [];
        const existingIds = new Set(appData.assets.map(a => String(a.id).toLowerCase()));
        const existingNames = new Set(appData.assets.map(a => String(a.name).toLowerCase()));
        const pendingIds = [];
        let added = 0, skipped = 0, invalid = 0;
        (rows || []).filter(r => Object.values(r || {}).some(v => String(v ?? '').trim() !== '')).forEach(r => {
            const a = parseAssetImportRow(r);
            if (!a.name) { invalid++; return; }
            if (!a.id) a.id = generateAssetId(a.name, appData.assets, pendingIds);
            const idKey = a.id.toLowerCase();
            const nameKey = a.name.toLowerCase();
            if (existingIds.has(idKey) || existingNames.has(nameKey)) { skipped++; return; }
            appData.assets.push(a);
            existingIds.add(idKey);
            existingNames.add(nameKey);
            pendingIds.push(a.id);
            added++;
        });
        return { added, skipped, invalid };
    }

    window.triggerBulkImport = (type) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx,.xls,.csv';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const sheetName = (type === 'assets' && wb.SheetNames.includes('Assets')) ? 'Assets' : wb.SheetNames[0];
                    const ws = wb.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(ws);
                    if (type === 'assets') {
                        const result = importAssetsFromRows(rows);
                        if (!result.added && !result.skipped && result.invalid) {
                            alert('No valid rows found.\n\nUse "Download Excel Template", fill Asset Name (ID optional), then upload again.');
                            return;
                        }
                        saveDB();
                        alert(`Asset import complete.\n\nAdded: ${result.added}\nSkipped (duplicate): ${result.skipped}\nInvalid (missing Name): ${result.invalid}`);
                        return;
                    } else if (type === 'projects') {
                        const existingNames = new Set(appData.projects.map(p => (p.name||'').toLowerCase()));
                        let seq = appData.projects.length;
                        const seenInFile = new Set();
                        const newP = [];
                        rows.forEach(r => {
                            const name = String(r["Cost Center Name"] || r["Cost Centre Name"] || r["Project Name"] || r["name"] || "").trim();
                            const ccNo = name;
                            const key = name.toLowerCase();
                            if (!name || existingNames.has(key) || seenInFile.has(key)) return;
                            seenInFile.add(key);
                            seq++;
                            newP.push({ id: "P-" + (Date.now() + seq), name, ccNo, status: "Active", priority: seq, bomItems: 0, remarks: "" });
                        });
                        appData.projects = [...appData.projects, ...newP];
                    } else if (type === 'users') {
                        const newU = rows.map(r => ({
                            id: String(r["ID"] || r["Personnel ID"] || ""),
                            name: String(r["Name"] || r["Full Name"] || ""),
                            role: String(r["Role"] || r["System Role"] || "creator").toLowerCase(),
                            dept: String(r["Dept"] || r["Department"] || ""),
                            responsibility: String(r["Responsibility"] || r["Duties"] || ""),
                            password: String(r["Password"] || "pass123"),
                            active: true
                        })).filter(u => u.id && u.name);
                        appData.users = [...appData.users, ...newU];
                    }
                    saveDB();
                    alert("Import successful!");
                } catch(err) { alert("Import failed: " + err.message); }
            };
            reader.readAsBinaryString(file);
        };
        input.click();
    };

    function initChartPlugins() {
        const ChartCtor = getChartCtor();

    function chartValueLabelPluginOpts(chartType, opts) {
        const isBar = chartType === 'bar';
        const isLine = chartType === 'line';
        const isCartesian = isBar || isLine;
        const isPct = opts && opts.pct;
        const isRound = ['pie', 'doughnut', 'polarArea'].includes(chartType);
        const indexAxis = (opts && opts.indexAxis) || 'x';

        function barLargeEnough(ctx) {
            const meta = ctx.chart.getDatasetMeta(ctx.datasetIndex);
            const bar = meta && meta.data[ctx.dataIndex];
            if (!bar) return true;
            const size = indexAxis === 'y' ? Math.abs(bar.width || 0) : Math.abs(bar.height || 0);
            return size >= 20;
        }

        if (isBar) {
            return {
                display: (ctx) => {
                    const v = ctx.dataset.data[ctx.dataIndex];
                    return v != null && Number(v) !== 0 && barLargeEnough(ctx);
                },
                color: '#ffffff',
                font: { family: 'Inter, system-ui, sans-serif', weight: '600', size: 10 },
                anchor: 'center',
                align: 'center',
                offset: 0,
                clip: true,
                formatter: (value) => isPct ? (Number(value) + '%') : String(Number(value))
            };
        }

        return {
            display: (ctx) => {
                const v = ctx.dataset.data[ctx.dataIndex];
                return v != null && Number(v) !== 0;
            },
            color: () => isLine ? '#475569' : '#ffffff',
            font: {
                family: 'Inter, system-ui, sans-serif',
                weight: isLine ? '500' : ((opts && opts.small) ? '500' : '600'),
                size: (opts && opts.small) ? 8 : (isLine ? 10 : 10)
            },
            anchor: isLine ? 'end' : 'center',
            align: isLine ? 'top' : 'center',
            offset: isLine ? 4 : 0,
            clip: true,
            textStrokeColor: isRound ? 'rgba(11,20,32,0.2)' : undefined,
            textStrokeWidth: isRound ? 1 : 0,
            formatter: (value, ctx) => {
                const n = Number(value);
                if (!n) return '';
                if (isPct) return n + '%';
                if (opts && opts.small) return String(n);
                if (isRound) {
                    const total = ctx.dataset.data.reduce((a, b) => a + (Number(b) || 0), 0);
                    const pct = total ? Math.round((n / total) * 100) : 0;
                    return pct >= 8 ? `${n} (${pct}%)` : String(n);
                }
                return String(n);
            }
        };
    }

    function withDataLabels(config, labelOpts) {
        const opts = config.options || {};
        const plugins = opts.plugins || {};
        const dlOpts = {
            ...(labelOpts || {}),
            indexAxis: opts.indexAxis || 'x'
        };
        return {
            ...config,
            options: {
                ...opts,
                plugins: {
                    ...plugins,
                    datalabels: chartValueLabelPluginOpts(config.type, dlOpts)
                }
            }
        };
    }

    function createAppChart(canvasEl, config, labelOpts) {
        initChartPlugins();
        const ChartCtor = getChartCtor();
        if (!canvasEl || !ChartCtor) return null;
        const cfg = withDataLabels(config, labelOpts);
        try {
            const chart = new ChartCtor(canvasEl, cfg);
            requestAnimationFrame(() => { try { chart.resize(); } catch (e) {} });
            return chart;
        } catch (err) {
            console.error('Chart render failed:', err);
            return null;
        }
    }

    // Card click → jump into the Data Centre pre-filtered to that slice.
    window.dcApplyPreset = (type) => {
        if (!canSeeAllDepartmentMrs()) {
            if (type === 'total_mr') { activeTab = 'tracking'; render(); return; }
            activeTab = 'tracking';
            render();
            return;
        }
        dcGlobalQ = ''; dcColFilter = {}; dcPreset = null; dcPage = 1;
        switch (type) {
            case 'total_mr':        activeTab = 'tracking'; render(); return;
            case 'total_pr':        break; // no filter — show every PR
            case 'po_given':        dcColFilter.status = 'PROCUREMENT'; break;
            case 'partial':         dcColFilter.status = 'PARTIAL'; break;
            case 'received':        dcColFilter.status = 'CLOSED'; break;
            case 'hold':            dcColFilter.status = 'HOLD'; break;
            case 'cancel':          dcColFilter.status = 'CANCELLED'; break;
            case 'req_delay':       dcPreset = 'req_delay'; break;

            case 'today_delivery':  dcPreset = 'today_delivery'; break;
            case 'overdue_delivery':dcPreset = 'overdue_delivery'; break;

    };

    window._activeCcRid = null;
    window._activeCcInput = null;
    window.onCcFocus = (rid, input) => {
        window._activeCcRid = rid;
        window._activeCcInput = input;
        window.renderCcDropdown();
    };
    window.onCcInput = (rid, input) => {
        window._activeCcRid = rid;
        window._activeCcInput = input;
        window.renderCcDropdown();
        window.onFieldChange(rid, 'project', input.value);
    };
    window.hideCcDropdown = () => {
        const el = document.getElementById('cc-autocomplete');
        if (el) el.style.display = 'none';
    };
    window.renderCcDropdown = () => {
        const el = document.getElementById('cc-autocomplete');
        const input = window._activeCcInput;
        if (!el || !input) return;
        
        const rect = input.getBoundingClientRect();
        el.style.top = rect.bottom + 'px';
        el.style.left = rect.left + 'px';
        el.style.width = rect.width + 'px';
        el.style.display = 'block';
        
        const val = (input.value || '').toLowerCase();
        const matches = (appData.projects || []).filter(p => p.name.toLowerCase().includes(val));
        
        if (matches.length === 0) {
            el.innerHTML = '<div style="padding:6px 8px; color:#999;">No matches</div>';
        } else {
            el.innerHTML = matches.map(p => 
                `<div style="padding:6px 8px; cursor:pointer; color:#333; word-break:break-word;" 
                      onmouseover="this.style.background='#f0fdf4'" 
                      onmouseout="this.style.background=''"
                      onmousedown="window.selectCcItem('${esc(p.name)}')">
                    ${esc(p.name)}
                </div>`
            ).join('');
        }
    };
    window.selectCcItem = (name) => {
        if (window._activeCcInput && window._activeCcRid !== null) {
            window._activeCcInput.value = name;
            window.onFieldChange(window._activeCcRid, 'project', name);
        }
        window.hideCcDropdown();
    };

    document.addEventListener('mousedown', (e) => {
        const el = document.getElementById('cc-autocomplete');
        if (el && el.style.display === 'block') {
            if (!el.contains(e.target) && window._activeCcInput !== e.target) {
                window.hideCcDropdown();
            }
        }
    });
