                    </button>` : ''}

                    <div class="px-3 py-1.5 text-[10px] font-black bg-white border border-rule rounded-lg text-slate-500">${dcPage} / ${totalPages}</div>
                    <button onclick="window.dcSetPage(${Math.min(totalPages,dcPage+1)})" class="px-3 py-1.5 text-[10px] font-black uppercase bg-white border border-rule rounded-lg">Next</button>
                </div>
            </div>
        </div>`;

    window.dcExportExcel = () => {
        const rows = dcFilteredRows();
        const data = rows.map(r => ({
            'PR No': r.prNo, 'Source': r.source==='DIRECT_PR'?'Direct PR':'MR Based', 'Date': fmtDate(r.date), 'Item': r.item, 'Specification': r.spec, 'Sample Make': r.sampleMake,
            'Qty': r.qty, 'Unit': r.unit, 'Rate': r.rate, 'Amount': r.amount,
            'Item Completion %': r.itemCompletionPct,
            'Tentative Required Date': r.reqDate,
            'Cost Centre': r.costCentre, 'Revision': r.revision, 'Delivery Location': r.deliveryLoc, 'Initiator Department': r.dept,
            'PO Number': r.poNo, 'PO Date': r.poDate, 'Status': STATUS_META[r.status]?.label || r.status,
            'PR Handle By': r.prHandleBy, 'Tentative Delivery Date': r.tentDelivery,
            'Requirement Delay (Days)': r.reqDelayDays, 'Delivery Delay (Days)': r.deliveryDelayDays, 'Remarks': r.remarks
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'Data Centre');
        XLSX.writeFile(wb, `Indus_Fire_DataCentre_${fmtDateInput(Date.now())}.xlsx`);
    };

    window.dcExportPdf = () => {
        const rows = dcFilteredRows();
        const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a3' });
        doc.setFontSize(14); doc.text('Indus Fire Safety — Procurement Data Centre', 30, 30);
        doc.autoTable({
            startY: 45, styles: { fontSize: 6 },
            head: [['PR No','Date','Item','Spec','Sample Make','Qty','Unit','Rate','Amount','Req. Date','Cost Centre','Rev','Delivery Loc','Dept','PO No','PO Date','Status','Handle By','Tent. Delivery','Req. Delay','Delivery Delay','Remarks']],
            body: rows.map(r => [r.prNo, fmtDate(r.date), r.item, r.spec, r.sampleMake, r.qty, r.unit, r.rate, r.amount, r.reqDate, r.costCentre, r.revision, r.deliveryLoc, r.dept, r.poNo, r.poDate, STATUS_META[r.status]?.label||r.status, r.prHandleBy, r.tentDelivery, r.reqDelayDays, r.deliveryDelayDays, r.remarks])
        });
        doc.save(`Indus_Fire_DataCentre_${fmtDateInput(Date.now())}.pdf`);
    };

                ${q ? `<button onclick="window.setRegistryFilter('departments','')" class="text-[10px] font-bold uppercase text-slate-400 hover:text-brand shrink-0">Clear</button>` : ''}

            <div class="bg-white rounded-xl border border-rule overflow-hidden shadow-panel">

                    <thead><tr class="bg-paper text-[9px] font-black text-slate-500 uppercase tracking-widest border-b border-rule">

        </div>`;

            const hay = [item.id, item.name, item.specification, item.unit].map(v => String(v || '').toLowerCase()).join(' ');

        return `

                <div>
                    <h1 class="text-2xl font-display font-bold uppercase tracking-tight">Assets Master</h1>

    // ── PROCUREMENT TEAM PERFORMANCE (Workload Dashboard, Charts, Work Queue) ─
    function applyProcFilters(rows, f) {
        return rows.filter(r => {
            if (f.handler && r.prHandleBy !== f.handler) return false;
            if (f.project && r.costCentre !== f.project) return false;
            if (f.vendor && r.vendor !== f.vendor) return false;
            if (f.status && r.status !== f.status) return false;
            if (f.dept && r.dept !== f.dept) return false;
            if (f.priority) {
                const proj = (appData.projects||[]).find(p => p.name === r.costCentre);
                if (!proj || String(proj.priority) !== String(f.priority)) return false;
            }
            if (f.dateFrom && r.date && r.date < new Date(f.dateFrom).getTime()) return false;
            if (f.dateTo && r.date && r.date > (new Date(f.dateTo).getTime() + 86399999)) return false;
            return true;
        });
    }

    function computeHandlerPerformance(rows) {
        return (appData.procHandlers || []).map(h => {
            const hRows = rows.filter(r => r.prHandleBy === h.name);
            const assigned = hRows.length;
            const completed = hRows.filter(r => r.status === 'CLOSED');
            const cancelled = hRows.filter(r => r.status === 'CANCELLED').length;
            const onHold = hRows.filter(r => r.status === 'HOLD').length;
            const delayed = hRows.filter(r => !['CLOSED','CANCELLED','HOLD'].includes(r.status) && (r.reqDelayDays > 0 || r.deliveryDelayDays > 0)).length;
            const pending = Math.max(0, assigned - completed.length - cancelled - onHold - delayed);
            const completionPct = assigned ? +((completed.length / assigned) * 100).toFixed(1) : 0;
            const procDays = [];
            completed.forEach(r => {
                const start = r.date ? new Date(r.date).getTime() : null;
                const end = r.materialReceived ? new Date(r.materialReceived).getTime() : (r.actualDelivery ? new Date(r.actualDelivery).getTime() : null);
                if (start && end && end >= start) procDays.push(Math.round((end - start) / 86400000));
            });
            const avgProcessing = procDays.length ? Math.round(procDays.reduce((a,b)=>a+b,0) / procDays.length) : null;
            return { handler: h, assigned, completed: completed.length, pending, delayed, onHold, cancelled, completionPct, avgProcessing, poCreated: hRows.filter(r=>r.poNo).length };
        });
    }

    function buildWorkQueue(rows, handlerName) {
        const todayStr = fmtDateInput(Date.now());
        const mine = rows.filter(r => r.prHandleBy === handlerName);
        return {
            assigned: mine,
            todayFollowUp: mine.filter(r => r.tentDelivery === todayStr && r.status !== 'CLOSED'),
            overduePOs: mine.filter(r => !r.poNo && r.reqDelayDays > 0 && !['CLOSED','CANCELLED'].includes(r.status)),
            expectedDeliveries: mine.filter(r => r.poNo && r.tentDelivery && !r.materialReceived && r.status !== 'CLOSED'),
            pendingVendorResponses: mine.filter(r => r.poNo && !r.tentDelivery && r.status !== 'CLOSED'),
            urgentMaterials: mine.filter(r => r.reqDelayDays > 3 && !['CLOSED','CANCELLED'].includes(r.status)),
            awaitingPO: mine.filter(r => !r.poNo && !['CANCELLED','HOLD'].includes(r.status)),
            awaitingDelivery: mine.filter(r => r.poNo && !['CLOSED','CANCELLED'].includes(r.status))
        };
    }

    // ── AUDIT MODAL ──────────────────────────────────────────────────────────
    function renderMrTimeline(mr) {
        const steps = [
            { key:'RAISED',      label:'MR Raised' },
            { key:'AUTHORIZED',  label:'Authorized' },
            { key:'PLANNED',     label:'Planning Approved' },
            { key:'PROCUREMENT', label:'PO Given', auto:true },
            { key:'PARTIAL',     label:'Partial Received' },
            { key:'CLOSED',      label:'Received' },
        ];
        const order = ['RAISED','QUERY_RAISED','AUTHORIZED','PLANNED','PROCUREMENT','PARTIAL','CLOSED'];
        const curIdx = order.indexOf(mr.status);
        const wasAutoPo = (mr.history||[]).some(h => h.action === 'PO Given (Auto)');
        const sideStatus = ['HOLD','CANCELLED'].includes(mr.status) ? mr.status : null;
        return `
        <div class="flex flex-wrap gap-2 items-center px-6 pt-5 pb-1 bg-paper/40 border-b border-rule">
            ${steps.map(s => {
                const idx = order.indexOf(s.key);
                const reached = curIdx >= 0 && idx <= curIdx;
                return `<div class="flex items-center gap-1.5">
                    <span class="text-[10px] font-black uppercase px-2.5 py-1 rounded-full ${reached ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-400'}">
                        ${reached ? '✔' : '○'} ${s.label}${(s.auto && reached && wasAutoPo) ? ' · Auto' : ''}
                    </span>
                    ${s.key !== 'CLOSED' ? '<span class="text-slate-300">→</span>' : ''}
                </div>`;
            }).join('')}
            ${sideStatus ? `<span class="text-[10px] font-black uppercase px-2.5 py-1 rounded-full" style="background:${STATUS_META[sideStatus].bg};color:${STATUS_META[sideStatus].color}">⚑ ${STATUS_META[sideStatus].label}</span>` : ''}
        </div>`;
    }

    // ── PRINT VIEW ───────────────────────────────────────────────────────────
    // Replicates the exact "PURCHASE REQUEST" sheet used at MR-creation time (see renderNewMR /
    // renderMrRow), then appends a full Approval & Authorization History (from the audit trail)
    // and a professional multi-role signature block. Built as thead/tfoot table groups so the
    // company header + MR meta repeat on every printed page and nothing overlaps a page break.
    function getMrsByPrNumber(prNumber) {
        return (appData.mrs || []).filter(m => m.prNumber === prNumber).sort((a, b) => (a.mrNumber || '').localeCompare(b.mrNumber || ''));
    }

    function buildCombinedPrPrintData(prNumber) {
        const mrs = getMrsByPrNumber(prNumber);
        const projectCc = {};
        (appData.projects || []).forEach(p => { if (p && p.name) projectCc[p.name] = p.ccNo || ''; });
        const items = [];
        mrs.forEach(mr => {
            (mr.items || []).forEach(it => {
                const rate = Number(it.rate) || 0, qty = Number(it.qty) || 1;
                const amount = it.amount != null ? it.amount : qty * rate;
                items.push({
                    refMrNumber: it.refMrNumber || mr.mrNumber,
                    sourceDept: mr.dept || '',
                    name: it.name, spec: it.spec || '', make: it.make || '', sampleProvided: it.sampleProvided || '',
                    qty, unit: it.unit || 'NOS', rate, amount,
                    requiredDate: it.requiredDate, project: it.project || '', remarks: it.remarks || '',
                    ccNo: projectCc[it.project] || ''
                });
            });
        });
        const history = [];
        mrs.forEach(mr => {
            (mr.history || []).forEach(h => {
                history.push({ ...h, mrNo: mr.mrNumber, dept: h.dept || mr.dept });
            });
        });
        history.sort((a, b) => (a.ts || 0) - (b.ts || 0));
        const primary = mrs[0] || {};
        return {
            prNumber,
            mrNumbers: mrs.map(m => m.mrNumber),
            depts: Array.from(new Set(mrs.map(m => m.dept).filter(Boolean))),
            items,
            history,
            plannedBy: primary.plannedBy || '',

        return svgs[type] || svgs.gear;
    }

    // ★★★ ADD ITEM REQUEST FEATURE ★★★
    // ══════════════════════════════════════════════════════════════════════════

    // Open the Add Item modal (creator side)
    window.openAddItemModal = () => {
        addItemForm = { name: '', description: '', uom: 'NOS', otherInfo: '' };
        showAddItemModal = true;
        render();
    };
    window.closeAddItemModal = () => { showAddItemModal = false; render(); };
    window.updateAddItemForm = (key, val) => { addItemForm[key] = val; };

    // Submit an item request — creator action
    window.submitItemRequest = () => {
        const name = (addItemForm.name || '').trim();
        if (!name) { alert('Item Name is required.'); return; }

        appData.itemRequests = appData.itemRequests || [];
        const req = {
            id: 'IR-' + Date.now(),
            name,
            description: (addItemForm.description || '').trim(),
            uom: (addItemForm.uom || 'NOS').trim() || 'NOS',
            otherInfo: (addItemForm.otherInfo || '').trim(),
            requestedBy: user.name,
            requestedById: user.id,
            dept: user.dept,
            createdAt: Date.now(),
            status: 'PENDING',
            reviewedBy: null,
            reviewedAt: null,
            rejectReason: '',
            approvedAssetId: ''
        };
        appData.itemRequests.push(req);

        // Notify all planners
        pushNotification(
            { level: 'PLANNING' },
            'New Item Request from ' + user.name + ' (' + user.dept + '): "' + name + '" — pending review under Planner → Item Requests.',
            null
        );

        saveDB(appData);
        showAddItemModal = false;
        showToast('Item request submitted! Planners have been notified.');
    };

    // Planner: open reject modal
    window.openItemRejectModal = (id) => {
        showItemRejectModal = id;
        itemRejectReason = '';
        render();
    };
    window.closeItemRejectModal = () => { showItemRejectModal = null; render(); };
    window.updateItemRejectReason = (val) => { itemRejectReason = val; };

    // Planner: approve item → add to Asset Master
    window.approveItemRequest = (id) => {
        const req = (appData.itemRequests || []).find(r => r.id === id);
        if (!req) return;
        if (req.status !== 'PENDING') { alert('This request has already been reviewed.'); return; }

        // Read any inline edits the planner may have typed
        const nameEl = document.getElementById('ir-name-' + id);
        const descEl = document.getElementById('ir-desc-' + id);
        const uomEl  = document.getElementById('ir-uom-' + id);
        const infoEl = document.getElementById('ir-info-' + id);
        if (nameEl) req.name        = nameEl.value.trim() || req.name;
        if (descEl) req.description = descEl.value.trim();
        if (uomEl)  req.uom         = uomEl.value.trim() || req.uom;
        if (infoEl) req.otherInfo   = infoEl.value.trim();

        if (!req.name) { alert('Item Name cannot be empty.'); return; }

        // Generate a new Asset ID and push to Asset Master
        appData.assets = appData.assets || [];
        const newAssetId = generateAssetId(req.name, appData.assets);
        appData.assets.push({
            id: newAssetId,
            name: req.name,
            specification: req.description || '',
            unit: req.uom || 'NOS'
        });

        req.status = 'APPROVED';
        req.reviewedBy = user.name;
        req.reviewedAt = Date.now();
        req.approvedAssetId = newAssetId;

        // Notify the original creator by userId
        pushNotification(
            { userId: req.requestedById },
            'Your item request "' + req.name + '" was APPROVED by ' + user.name + ' and added to Asset Master with ID: ' + newAssetId + '.',
            null
        );

        saveDB(appData);
        showToast('Approved! "' + req.name + '" added to Asset Master as ' + newAssetId);
    };

    // Planner: reject item request
    window.confirmItemReject = () => {
        const id = showItemRejectModal;
        if (!id) return;
        const req = (appData.itemRequests || []).find(r => r.id === id);
        if (!req) return;

        const reason = (itemRejectReason || '').trim();
        if (!reason) { alert('Please provide a reason for rejection.'); return; }

        req.status = 'REJECTED';
        req.reviewedBy = user.name;
        req.reviewedAt = Date.now();
        req.rejectReason = reason;

        // Notify the original creator
        pushNotification(
            { userId: req.requestedById },
            'Your item request "' + req.name + '" was REJECTED by ' + user.name + '. Reason: ' + reason,
            null
        );

        saveDB(appData);
        showItemRejectModal = null;
        showToast('Item request rejected and creator notified.');
    };

    // Render: Item Requests section (planner view)
    function renderItemRequestsSection() {
        const all = (appData.itemRequests || []).slice().sort((a,b) => b.createdAt - a.createdAt);
        const pending  = all.filter(r => r.status === 'PENDING');
        const reviewed = all.filter(r => r.status !== 'PENDING');

        function statusChip(s) {
            if (s === 'PENDING')  return '<span class="status-chip" style="background:#FEF3C7;color:#92400E;border-color:#D97706">● Pending</span>';
            if (s === 'APPROVED') return '<span class="status-chip" style="background:#D1FAE5;color:#065F46;border-color:#10B981">✓ Approved</span>';
            if (s === 'REJECTED') return '<span class="status-chip" style="background:#FEE2E2;color:#991B1B;border-color:#EF4444">✗ Rejected</span>';
            return s;
        }

        function renderRow(req) {
            const uomOpts = ['NOS','MTR','KG','LTR','SET','BOX','ROLL','PCS','SQM','RFT'].map(u =>
                '<option value="' + u + '"' + (req.uom === u ? ' selected' : '') + '>' + u + '</option>'
            ).join('');
            const isPending = req.status === 'PENDING';
            const borderCls = isPending ? 'border-amber-200 shadow-md' : 'border-rule shadow-panel';
            const bgCls = isPending ? 'bg-amber-50/60' : 'bg-white';

            let editFields = '';
            if (isPending) {
                editFields = '<div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">' +
                    '<div><label class="field-label">Item Name *</label><input id="ir-name-' + req.id + '" class="glass-input font-bold" value="' + esc(req.name) + '" placeholder="Item name" /></div>' +
                    '<div><label class="field-label">UOM</label><select id="ir-uom-' + req.id + '" class="glass-input">' + uomOpts + '</select></div>' +
                    '<div class="sm:col-span-2"><label class="field-label">Description / Specification</label><input id="ir-desc-' + req.id + '" class="glass-input" value="' + esc(req.description) + '" placeholder="Specification" /></div>' +
                    '<div class="sm:col-span-2"><label class="field-label">Other Information</label><input id="ir-info-' + req.id + '" class="glass-input" value="' + esc(req.otherInfo) + '" placeholder="Make, model, etc." /></div>' +
                '</div>';
            } else {
                let extraInfo = '';
                if (req.status === 'APPROVED') extraInfo = '<p class="text-xs font-bold text-emerald-600 mt-1">✓ Added to Asset Master as <span class="font-mono">' + esc(req.approvedAssetId) + '</span> · Reviewed by ' + esc(req.reviewedBy) + ' on ' + fmtDate(req.reviewedAt) + '</p>';
                if (req.status === 'REJECTED')  extraInfo = '<p class="text-xs font-bold text-red-600 mt-1">✗ Rejected by ' + esc(req.reviewedBy) + ' on ' + fmtDate(req.reviewedAt) + '<br/><span class="font-normal text-slate-600">Reason: ' + esc(req.rejectReason) + '</span></p>';
                editFields = '<div class="mt-2 space-y-1">' +
                    '<p class="text-sm font-bold text-ink">' + esc(req.name) + ' <span class="text-slate-400 font-normal">(' + esc(req.uom) + ')</span></p>' +
                    (req.description ? '<p class="text-xs text-slate-500">' + esc(req.description) + '</p>' : '') +
                    extraInfo + '</div>';
            }

            let actions = '';
            if (isPending) {
                actions = '<div class="flex gap-2 shrink-0 mt-1">' +
                    '<button onclick="window.approveItemRequest(\'' + req.id + '\')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-700 flex items-center gap-1.5 shadow"><i data-lucide="check" class="w-3.5 h-3.5"></i> Approve &amp; Add</button>' +
                    '<button onclick="window.openItemRejectModal(\'' + req.id + '\')" class="border border-red-200 text-red-600 px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all flex items-center gap-1.5"><i data-lucide="x" class="w-3.5 h-3.5"></i> Reject</button>' +
                '</div>';
            }

            return '<div class="bg-white rounded-2xl border ' + borderCls + ' overflow-hidden">' +
                '<div class="px-6 py-4 flex items-start justify-between gap-4 flex-wrap ' + bgCls + '">' +
                    '<div class="flex-1 min-w-0">' +
                        '<div class="flex items-center gap-3 flex-wrap">' +
                            statusChip(req.status) +
                            '<span class="text-[10px] font-mono text-slate-400">' + req.id + '</span>' +
                            '<span class="text-[10px] text-slate-400">by ' + esc(req.requestedBy) + ' · ' + esc(req.dept) + ' · ' + fmtDate(req.createdAt) + '</span>' +
                        '</div>' +
                        editFields +
                    '</div>' +
                    actions +
                '</div>' +
            '</div>';
        }

        let body = '';
        if (all.length === 0) {
            body = '<div class="bg-white rounded-2xl border border-rule shadow-panel p-12 text-center">' +
                '<div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-slate-100 flex items-center justify-center"><i data-lucide="package-plus" class="w-7 h-7 text-slate-400"></i></div>' +
                '<p class="text-sm font-bold text-slate-500">No item requests yet</p>' +
                '<p class="text-xs text-slate-400 mt-1">Creators submit requests from their Department Dashboard using the &quot;+ Add Item&quot; button.</p>' +
            '</div>';
        }
        if (pending.length > 0) {
            body += '<div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-500 inline-block"></span> Pending Review (' + pending.length + ')</h3><div class="space-y-4">' + pending.map(renderRow).join('') + '</div></div>';
        }
        if (reviewed.length > 0) {
            body += '<div><h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3 mt-6 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-400 inline-block"></span> Reviewed History (' + reviewed.length + ')</h3><div class="space-y-3">' + reviewed.map(renderRow).join('') + '</div></div>';
        }

        const pendingCount = pending.length;
        const reviewedCount = reviewed.length;
        return '<div class="space-y-6 fade-in">' +
            '<div class="flex items-center justify-between flex-wrap gap-3">' +
                '<div>' +
                    '<h2 class="text-xl font-display font-bold tracking-tight">Item Requests</h2>' +
                    '<p class="text-sm text-slate-500 mt-1">Review and approve new material items requested by department users. Approved items are added to the Asset Master.</p>' +
                '</div>' +
                '<div class="flex gap-3">' +
                    '<span class="text-xs font-black uppercase tracking-widest px-3 py-1.5 rounded-full bg-amber-100 text-amber-700">' + pendingCount + ' Pending</span>' +
                    '<span class="text-xs font-black uppercase tracking-widest px-3 py-1.5 rounded-full bg-slate-100 text-slate-600">' + reviewedCount + ' Reviewed</span>' +
                '</div>' +
            '</div>' +
            body +
        '</div>';
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ★★★ SUPABASE SYNC ENGINE — DO NOT MODIFY BELOW THIS LINE ★★★
    // ══════════════════════════════════════════════════════════════════════════


    // ══════════════════════════════════════════════════════════════════════════
    // ★★★ SUPABASE REALTIME SYNC ★★★
    // Subscribes to Postgres changes on app_state so every browser sees updates
    // within ~1-2 seconds without manual refresh.
    // ══════════════════════════════════════════════════════════════════════════
    let _realtimeChannel = null;
    let _lastSaveTs = 0; // prevents echo — our own save triggering a reload

    function startRealtimeSync() {
        if (_realtimeChannel) return;
        _realtimeChannel = _supabaseClient
            .channel('app_state_changes')
            .on(
                'postgres_changes',
                { event: 'UPDATE', schema: 'public', table: 'app_state', filter: 'id=eq.1' },
                function(payload) {
                    if (Date.now() - _lastSaveTs < 3000) return; // suppress echo
                    console.log('[Realtime] Remote change detected — reloading data...');
                    var newData = payload.new && payload.new.data;
                    if (!newData || typeof newData !== 'object') return;
                    migrateToItemLevelProcurement(newData);
                    migrateUsersAndNotifications(newData);
                    migrateProcHandlers(newData);
                    migrateDepartments(newData);
                    migrateSequences(newData);
                    if (!Array.isArray(newData.mrDrafts)) newData.mrDrafts = [];
                    if (!Array.isArray(newData.itemRequests)) newData.itemRequests = [];
                    appData = newData;
                    window.appData = appData;
                    try { localStorage.setItem(DB_KEY, JSON.stringify(appData)); } catch(e) {}
                    render();
                    showToast('Data refreshed from cloud ✓');
                    console.log('[Realtime] UI updated from remote change');
                }
            )
            .subscribe(function(status) {
                console.log('[Realtime] Subscription status:', status);
            });
    }

    function stopRealtimeSync() {
        if (_realtimeChannel) {
            _supabaseClient.removeChannel(_realtimeChannel);
            _realtimeChannel = null;
        }
    }

    /**
     * Save the entire app state to Supabase (cloud) + localStorage (local backup).
     * Fire-and-forget for cloud — the UI updates immediately from the in-memory object.
     * @param {object} [dataToSave] — defaults to appData if not provided
     */
    async function saveDB(dataToSave) {
        const payload = dataToSave !== undefined ? dataToSave : appData;

        // 1. Immediate local backup — instant, never fails, keeps UI snappy
        try {
            localStorage.setItem(DB_KEY, JSON.stringify(payload));
        } catch (e) {
            console.warn('[saveDB] localStorage write failed (storage full?)', e);
        }

        // 2. Expose on window for any direct access from console
        window.appData = payload;

        // 3. Re-render immediately so the user sees updated state without waiting for cloud
        render();

        // 4. Async cloud upsert — best-effort, non-blocking
        _lastSaveTs = Date.now();
        try {
            const { error } = await _supabaseClient
                .from('app_state')
                .upsert({ id: 1, data: payload, updated_at: new Date().toISOString() });

            if (error) {
                console.error('[saveDB] Supabase upsert failed:', error.message);
            } else {
                console.log('[saveDB] ✓ Saved to Supabase cloud');
            }
        } catch (err) {
            console.error('[saveDB] Supabase exception:', err);
        }
    }

    /**
     * Load app state from Supabase. Falls back to localStorage, then SEED data.
     * This is the ONLY place the async cloud fetch happens.
     */
    async function loadDB() {
        // Show loading indicator
        document.getElementById('app-root').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:Inter,sans-serif;background:#0B1420;color:#fff;">' +
            '<div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:#B3122E;border-radius:50%;animation:spin 0.8s linear infinite"></div>' +
            '<p style="font-size:14px;font-weight:600;opacity:0.7;letter-spacing:0.05em;">Connecting to cloud...</p>' +
            '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>' +
            '</div>';

        try {
            const { data, error } = await _supabaseClient
                .from('app_state')
                .select('data')
                .eq('id', 1)
                .single();

            if (!error && data && data.data && Object.keys(data.data).length > 0) {
                console.log('[loadDB] ✓ Loaded from Supabase cloud');
                const d = data.data;
                // Run all migrations to ensure compatibility
                migrateToItemLevelProcurement(d);
                migrateUsersAndNotifications(d);
                migrateProcHandlers(d);
                migrateDepartments(d);
                migrateSequences(d);
                if (!Array.isArray(d.mrDrafts)) d.mrDrafts = [];
                if (!Array.isArray(d.itemRequests)) d.itemRequests = [];
                // Also cache locally
                try { localStorage.setItem(DB_KEY, JSON.stringify(d)); } catch(e) {}
                return d;
            }

            // Supabase returned empty or error — check if it's a real error
            if (error && error.code !== 'PGRST116') {
                // PGRST116 = no rows found (expected on first run), anything else is a real error
                console.error('[loadDB] Supabase error:', error.message);
            }

            // Fall back to localStorage (last session's data)
            console.warn('[loadDB] Supabase empty/unreachable — trying localStorage fallback');
            return loadFromLocalStorage();

        } catch (err) {
            console.error('[loadDB] Exception:', err);
            return loadFromLocalStorage();
        }
    }

    // ── ASYNC BOOT ─────────────────────────────────────────────────────────────
    (async function init() {
        try {
            appData = await loadDB();
        } catch (e) {
            console.error('[init] Critical load failure, falling back to seed data:', e);
            appData = loadFromLocalStorage();
        }
        window.appData = appData;
        render();
        startRealtimeSync(); // Live sync across tabs/devices
    })();

</script>
