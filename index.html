    // ── BUDGET REPORT ────────────────────────────────────────────────────────
    // Project-wise committed spend (qty × rate across every line item in the current
    // report's filtered scope) vs. that project's optional Budget figure (Project Master).
    function computeBudgetReport(scoped) {
        const map = {};
        scoped.forEach(m => (m.items || []).forEach(it => {
            const proj = it.project || '(No Project)';
            map[proj] = map[proj] || { spent: 0, count: 0 };
            map[proj].spent += (Number(it.qty) || 0) * (Number(it.rate) || 0);
            map[proj].count++;
        }));
        return Object.entries(map).map(([proj, v]) => {
            const p = (appData.projects || []).find(x => x.name === proj);
            const budget = (p && p.budget) ? Number(p.budget) : null;
            const pct = budget ? (v.spent / budget * 100) : null;
            return { project: proj, spent: v.spent, count: v.count, budget, pct };
        }).sort((a,b) => b.spent - a.spent);
    }
    function renderBudgetReportSection(scoped) {
        const rows = computeBudgetReport(scoped);
        if (!rows.length) return '';
        return `
        <div class="bg-white rounded-2xl border border-rule shadow-panel p-6">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Budget Report — Project-wise Committed Spend</h3>
            <table class="w-full text-[11px]">
                <thead><tr class="text-slate-400 uppercase text-[9px] font-black text-left border-b border-rule">
                    <th class="py-2">Project</th><th class="py-2 text-right">Line Items</th><th class="py-2 text-right">Committed Amount</th><th class="py-2 text-right">Budget</th><th class="py-2 text-right">Status</th>
                </tr></thead>
                <tbody>
                ${rows.map(r => {
                    let statusHtml = '<span class="text-slate-400">No budget set</span>';
                    if (r.budget != null) {
                        const over = r.pct > 100;
                        statusHtml = `<span style="font-weight:800;color:${over ? '#B91C1C' : (r.pct > 80 ? '#B45309' : '#047857')}">${r.pct.toFixed(0)}%${over ? ' OVER' : ''}</span>`;
                    }
                    return `<tr class="border-t border-rule">
                        <td class="py-2 font-bold">${esc(r.project)}</td>
                        <td class="py-2 text-right text-slate-500">${r.count}</td>
                        <td class="py-2 text-right font-bold">₹${r.spent.toLocaleString('en-IN', {maximumFractionDigits:0})}</td>
                        <td class="py-2 text-right text-slate-500">${r.budget != null ? '₹'+r.budget.toLocaleString('en-IN', {maximumFractionDigits:0}) : '—'}</td>
                        <td class="py-2 text-right">${statusHtml}</td>
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
        </div>`;
    }

    // ── PERIOD ROLLUP REPORT (Daily / Weekly / Monthly / Yearly) ────────────
    function isoWeekOf(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        const dayNum = date.getUTCDay() || 7;
        date.setUTCDate(date.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }
    function computePeriodRollup(scoped) {
        const buckets = { daily: {}, weekly: {}, monthly: {}, yearly: {} };
        scoped.forEach(m => {
            const d = new Date(m.createdAt);
            const yearKey = String(d.getFullYear());
            const monthKey = `${yearKey}-${String(d.getMonth()+1).padStart(2,'0')}`;
            const dayKey = fmtDateInput(m.createdAt);
            const weekKey = `${yearKey}-W${String(isoWeekOf(d)).padStart(2,'0')}`;
            buckets.daily[dayKey]     = (buckets.daily[dayKey]||0) + 1;
            buckets.weekly[weekKey]   = (buckets.weekly[weekKey]||0) + 1;
            buckets.monthly[monthKey] = (buckets.monthly[monthKey]||0) + 1;
            buckets.yearly[yearKey]   = (buckets.yearly[yearKey]||0) + 1;
        });
        return buckets;
    }
    window.setReportRollupView = (view) => { reportRollupView = view; softRender(); };
    function renderPeriodRollupSection(scoped) {
        const buckets = computePeriodRollup(scoped);
        const view = reportRollupView;
        const limit = { daily: 14, weekly: 12, monthly: 12, yearly: 10 }[view];
        const entries = Object.entries(buckets[view]).sort((a,b) => a[0] < b[0] ? 1 : -1).slice(0, limit).reverse();
        const maxVal = Math.max(1, ...entries.map(e => e[1]));
        const tabBtn = (v, label) => `<button onclick="window.setReportRollupView('${v}')" class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest ${view===v ? 'bg-ink text-white' : 'bg-paper text-slate-500 hover:bg-slate-200'}">${label}</button>`;
        return `
        <div class="bg-white rounded-2xl border border-rule shadow-panel p-6">
            <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">MR Volume Rollup</h3>
                <div class="flex gap-1.5">${tabBtn('daily','Daily')}${tabBtn('weekly','Weekly')}${tabBtn('monthly','Monthly')}${tabBtn('yearly','Yearly')}</div>
            </div>
            ${entries.length === 0 ? `<p class="text-xs text-slate-400 text-center py-6">No data for this period.</p>` : `
            <div class="space-y-2">
                ${entries.map(([k,v]) => `
                <div class="flex items-center gap-3">
                    <div class="w-24 shrink-0 text-[10px] font-bold text-slate-500 font-mono">${esc(k)}</div>
                    <div class="flex-1 bg-paper rounded-full h-4 overflow-hidden"><div class="h-full bg-brand rounded-full" style="width:${(v/maxVal*100).toFixed(1)}%"></div></div>
                    <div class="w-8 text-right text-[11px] font-black">${v}</div>
                </div>`).join('')}
            </div>`}
        </div>`;
    }

    // ── PLANNING MODULE ──────────────────────────────────────────────────────
    // A Project Procurement Control Centre for the Planner: executive KPIs, per-project
    // analytics with a health indicator, delay analytics, procurement & receipt performance,
    // pending-category drill-downs, advanced filters, and (below) the existing Planning
    // Approval Queue and a read-only Data Centre grid.
    window.setPlanFilter = (key, val) => { planFilters[key] = val; dcPage = 1; softRender(); };
    window.clearPlanFilters = () => {
        planFilters = { project:"", dept:"", plannedBy:"", procEngineer:"", vendor:"", status:"", source:"",
            mrNo:"", prNo:"", poNo:"", itemName:"", reqFrom:"", reqTo:"", poFrom:"", poTo:"", delFrom:"", delTo:"",
            delayMin:"", delayMax:"" };
        render();
    };
    window.setPlannerSection = (sec) => { plannerSection = sec; if (sec !== 'merge_pr') mergePrSelected = []; render(); };
    window.togglePlanProjectCards = () => {
        planProjectCardsExpanded = !planProjectCardsExpanded;
        if (!planProjectCardsExpanded && window._activePlanCharts) {
            window._activePlanCharts.forEach(c => { try { c.destroy(); } catch (e) {} });
            window._activePlanCharts = [];
        }
        render();
    };

    window.toggleMergePrSelect = (id) => {
        const idx = mergePrSelected.indexOf(id);
        if (idx >= 0) mergePrSelected.splice(idx, 1);
        else mergePrSelected.push(id);
        render();
    };
    window.selectAllMergeEligible = () => {
        mergePrSelected = getMergeEligibleMrs().map(m => m.id);
        render();
    };
    window.clearMergePrSelection = () => { mergePrSelected = []; render(); };
    window.setMergePrFilter = (val) => { mergePrFilter = val; softRender(); };

    // Planner combines multiple department MRs (all Authorized, no PR yet) into ONE PR number.
    // Each MR keeps its own items; every line item is stamped with refMrNumber = source MR.
    // All selected MRs share the same prNumber → one combined load in Data Centre / Procurement.
    window.executeMergeMrsToPr = () => {
        if (user.role !== 'planner' && user.role !== 'admin') {
            alert('Only Planner or Admin can merge MRs into a combined PR.');
            return;
        }
        const mrs = mergePrSelected.map(id => appData.mrs.find(m => m.id === id)).filter(Boolean);
        if (mrs.length < 2) {
            alert('Select at least 2 Authorized MRs to merge into a single PR.');
            return;
        }
        if (mrs.some(m => !isMergeEligibleMr(m))) {
            alert('One or more selected MRs are no longer eligible (must be Authorized, MR-based, and without a PR).');
            mergePrSelected = mrs.filter(isMergeEligibleMr).map(m => m.id);
            render();
            return;
        }
        const noteEl = document.getElementById('merge-pr-note');
        const note = noteEl ? noteEl.value.trim() : '';
        const prNumber = consumeNextPrNumber();
        const mrNumbers = mrs.map(m => m.mrNumber).sort();
        const deptList = Array.from(new Set(mrs.map(m => m.dept))).join(', ');
        const totalItems = mrs.reduce((s, m) => s + (m.items || []).length, 0);
        const summary = `${mrs.length} MRs · ${deptList} · ${totalItems} line item(s)`;

        mrs.forEach(mr => {
            mr.prNumber = prNumber;
            mr.status = 'PLANNED';
            mr.plannedBy = user.name;
            mr.planningDate = Date.now();
            mr.combinedPr = true;
            mr.prGroupMrs = mrNumbers.slice();
            (mr.items || []).forEach(it => {
                it.refMrNumber = mr.mrNumber;
                if (!it.status || !['PROCUREMENT','PARTIAL','CLOSED','HOLD','CANCELLED'].includes(it.status)) it.status = 'PLANNED';
            });
            mr.history = mr.history || [];
            mr.history.push({
                action: 'Combined PR Generated (Multi-Dept Merge)', actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field: 'status', oldValue: STATUS_META.AUTHORIZED.label, newValue: STATUS_META.PLANNED.label,
                note: `PR ${prNumber} shared across [${mrNumbers.join(', ')}]${note ? ' — ' + note : ''}`
            });
        });

        pushNotification({ level: 'PROCUREMENT' },
            `Combined PR ${prNumber} from ${mrs.length} MRs (${deptList}) — ${totalItems} items pending Procurement.`, mrs[0].id);

        mergePrSelected = [];
        printPrNumber = prNumber;
        printMrData = null;
        autoPrintAfterRender = true;
        saveDB();
    };

    function planFilteredRows() {
        let rows = buildPrRows();
        const f = planFilters;
        const inRange = (val, from, to) => {
            if (!val) return !(from || to);
            if (from && val < from) return false;
            if (to && val > to) return false;
            return true;
        };
        return rows.filter(r => {
            if (f.project && r.costCentre !== f.project) return false;
            if (f.dept && r.dept !== f.dept) return false;
            if (f.plannedBy && r.plannedBy !== f.plannedBy) return false;
            if (f.procEngineer && r.prHandleBy !== f.procEngineer) return false;
            if (f.vendor && !String(r.vendor||'').toLowerCase().includes(f.vendor.toLowerCase())) return false;
            if (f.status && r.status !== f.status) return false;
            if (f.source && r.source !== f.source) return false;
            if (f.mrNo && !String(r.mrNo||'').toLowerCase().includes(f.mrNo.toLowerCase())) return false;
            if (f.prNo && !String(r.prNo||'').toLowerCase().includes(f.prNo.toLowerCase())) return false;
            if (f.poNo && !String(r.poNo||'').toLowerCase().includes(f.poNo.toLowerCase())) return false;
            if (f.itemName && !String(r.item||'').toLowerCase().includes(f.itemName.toLowerCase())) return false;
            if (!inRange(r.reqDate, f.reqFrom, f.reqTo)) return false;
            if (!inRange(r.poDate, f.poFrom, f.poTo)) return false;
            if (!inRange(r.tentDelivery, f.delFrom, f.delTo)) return false;
            const worstDelay = Math.max(r.reqDelayDays||0, r.deliveryDelayDays||0);
            if (f.delayMin !== "" && worstDelay < Number(f.delayMin)) return false;
            if (f.delayMax !== "" && worstDelay > Number(f.delayMax)) return false;
            return true;
        });
    }

    function planHealth(completionPct, delayPct) {
        if (completionPct < 70 || delayPct > 15) return { key:'red',    label:'Attention', color:'#B91C1C', bg:'#FEE2E2', dot:'🔴' };
        if (completionPct <= 90 || (delayPct >= 5 && delayPct <= 15)) return { key:'yellow', label:'Watch',     color:'#A6620B', bg:'#FCF1DF', dot:'🟡' };
        return { key:'green', label:'On Track', color:'#047857', bg:'#E5F6EF', dot:'🟢' };
    }

    function planProjectAnalytics(rows) {
        const projects = {};
        rows.forEach(r => {
            const p = r.costCentre || '— No Project —';
            if (!projects[p]) projects[p] = {
                name: p, mrSet: new Set(), prSet: new Set(), poSet: new Set(), holdSet: new Set(), cancelSet: new Set(),
                totalQty: 0, receivedQty: 0, delayedItems: 0, totalItems: 0
            };
            const pr = projects[p];
            pr.mrSet.add(r.mrNo); pr.prSet.add(r.prNo);
            if (r.poNo) pr.poSet.add(r.prNo);
            if (r.status === 'HOLD') pr.holdSet.add(r.prNo);
            if (r.status === 'CANCELLED') pr.cancelSet.add(r.prNo);
            pr.totalQty += r.qty; pr.receivedQty += r.receivedQty;
            pr.totalItems += 1;
            if (Math.max(r.reqDelayDays||0, r.deliveryDelayDays||0) > 0) pr.delayedItems += 1;
        });
        return Object.values(projects).map(p => {
            const completionPct = p.totalQty > 0 ? +((p.receivedQty / p.totalQty) * 100).toFixed(1) : 0;
            const delayPct = p.totalItems > 0 ? +((p.delayedItems / p.totalItems) * 100).toFixed(1) : 0;
            const receivedFullSet = new Set(rows.filter(r => r.costCentre === p.name && r.itemCompletionPct >= 100).map(r=>r.prNo));
            const pendingSet = new Set(rows.filter(r => r.costCentre === p.name && r.itemCompletionPct < 100 && r.status!=='CANCELLED' && r.status!=='HOLD').map(r=>r.prNo));
            return {
                name: p.name, mrRaised: p.mrSet.size, prGenerated: p.prSet.size, poGiven: p.poSet.size,
                received: receivedFullSet.size, pending: pendingSet.size, cancelled: p.cancelSet.size, hold: p.holdSet.size,
                totalQty: p.totalQty, receivedQty: p.receivedQty, pendingQty: Math.max(0, p.totalQty - p.receivedQty),
                completionPct, delayPct, health: planHealth(completionPct, delayPct)
            };
        }).sort((a,b) => a.name.localeCompare(b.name));
    }

    function planDelayBuckets(rows) {
        const buckets = { none:0, b1_7:0, b8_15:0, b15p:0 };
        rows.forEach(r => {
            const d = Math.max(r.reqDelayDays||0, r.deliveryDelayDays||0);
            if (d <= 0) buckets.none++;
            else if (d <= 7) buckets.b1_7++;
            else if (d <= 15) buckets.b8_15++;
            else buckets.b15p++;
        });
        const total = rows.length;
        const delayedCount = buckets.b1_7 + buckets.b8_15 + buckets.b15p;
        const delayPct = total > 0 ? +((delayedCount/total)*100).toFixed(2) : 0;
        return { ...buckets, total, delayedCount, delayPct };
    }

    function planProcurementPerformance(rows) {
        const prSet = new Set(rows.map(r=>r.prNo));
        const poSet = new Set(rows.filter(r=>r.poNo).map(r=>r.prNo));
        const totalPR = prSet.size, poGiven = poSet.size, pendingPO = Math.max(0, totalPR - poGiven);
        const pct = totalPR > 0 ? +((poGiven/totalPR)*100).toFixed(2) : 0;
        return { totalPR, poGiven, pendingPO, pct };
    }

    function planReceiptPerformance(rows) {
        const poRows = rows.filter(r => r.poNo);
        const poQty = poRows.reduce((s,r)=>s+r.qty,0);
        const receivedQty = poRows.reduce((s,r)=>s+r.receivedQty,0);
        const pendingQty = Math.max(0, poQty - receivedQty);
        const pct = poQty > 0 ? +((receivedQty/poQty)*100).toFixed(2) : 0;
        return { poQty, receivedQty, pendingQty, pct };
    }

    function planMaterialDelay(rows) {
        // Received-before-required is approximated using the PR-level Material Received Date
        // against each item's own Tentative Required Date (receipt isn't tracked per line item).
        let requiredQty = 0, receivedBefore = 0, lateReceived = 0;
        rows.forEach(r => {
            requiredQty += r.qty;
            if (r.receivedQty > 0) {
                const onTime = r.materialReceived && r.reqDate && r.materialReceived <= r.reqDate;
                if (onTime) receivedBefore += r.receivedQty; else lateReceived += r.receivedQty;
            }
        });
        const delayPct = requiredQty > 0 ? +((lateReceived/requiredQty)*100).toFixed(2) : 0;
        return { requiredQty, receivedBefore, lateReceived, delayPct };
    }

    function planExecKPIs(rows) {
        const totalProjects = new Set(rows.map(r=>r.costCentre).filter(Boolean)).size;
        const totalMR = new Set(rows.map(r=>r.mrNo)).size;
        const totalPRAll = new Set(rows.map(r=>r.prNo)).size;
        const totalPRDirect = new Set(rows.filter(r=>r.source==='DIRECT_PR').map(r=>r.prNo)).size;
        const poSet = new Set(rows.filter(r=>r.poNo).map(r=>r.prNo));
        const prSet = new Set(rows.map(r=>r.prNo));
        const pendingPO = Math.max(0, prSet.size - poSet.size);
        const receivedQtyTotal = rows.reduce((s,r)=>s+r.receivedQty,0);
        const totalQty = rows.reduce((s,r)=>s+r.qty,0);
        const pendingQtyTotal = Math.max(0, totalQty - receivedQtyTotal);
        const procPerf = planProcurementPerformance(rows);
        const receiptPerf = planReceiptPerformance(rows);
        const matDelay = planMaterialDelay(rows);
        const holdItems = rows.filter(r=>r.status==='HOLD').length;
        const cancelledItems = rows.filter(r=>r.status==='CANCELLED').length;
        const closedRows = rows.filter(r => r.status === 'CLOSED');
        let avgLeadTime = 0, avgDeliveryDelay = 0;
        if (closedRows.length) {
            avgDeliveryDelay = +(closedRows.reduce((s,r)=>s+Math.max(0,r.deliveryDelayDays||0),0)/closedRows.length).toFixed(1);
        }
        const poRows = rows.filter(r=>r.poDate);
        if (poRows.length) {
            avgLeadTime = +(poRows.reduce((s,r)=>{
                const created = r.date, po = r.poDate ? new Date(r.poDate).getTime() : created;
                return s + Math.max(0,(po-created)/86400000);
            },0)/poRows.length).toFixed(1);
        }
        return { totalProjects, totalMR, totalPRAll, totalPRDirect, poGiven: poSet.size, pendingPO,
            receivedQtyTotal, pendingQtyTotal, procPct: procPerf.pct, receiptPct: receiptPerf.pct,
            matDelayPct: matDelay.delayPct, avgLeadTime, avgDeliveryDelay, holdItems, cancelledItems };
    }

    // ── PLANNING CONTROL BOARD ───────────────────────────────────────────────
    // Pure add-on beneath the existing Dashboard Summary. Reads exclusively from
    // appData.mrs / appData.projects / buildPrRows() / dcSummary() — no new
    // storage, no changes to any existing record shape.
    function computePlanningControlData() {
        const mrs = appData.mrs || [];
        const today = new Date(); today.setHours(0,0,0,0);
        const todayStr = fmtDateInput(Date.now());

        // Every line item across every MR (pre-PR and post-PR), used for planning-stage metrics.
        const allItems = [];
        mrs.forEach(mr => {
            (mr.items || []).forEach(it => {
                allItems.push({ ...it, mrId: mr.id, mrNo: mr.mrNumber, prNo: mr.prNumber, mrStatus: mr.status,
                    source: mr.source || 'MR_BASED', createdAt: mr.createdAt });
            });
        });

        const prRows = buildPrRows();          // items that have already cleared into a PR
        const dcSum  = dcSummary(prRows);

        const pendingPlanningMrs = mrs.filter(m => m.status === 'AUTHORIZED');
        const pendingDirectPr    = mrs.filter(m => m.source === 'DIRECT_PR' && m.status === 'RAISED');
        const prGeneratedToday   = mrs.filter(m => (m.history || []).some(h =>
            (h.action || '').includes('Planning Approved') && fmtDateInput(h.ts) === todayStr)).length;
        const totalPrGenerated   = mrs.filter(m => !!m.prNumber).length;

        const activeProjects = (appData.projects || []).filter(p => p.status === 'Active')
            .sort((a,b) => (a.priority || 999) - (b.priority || 999));

        const projectRows = activeProjects.map(p => {
            const itemsForProj = allItems.filter(it => it.project === p.name);
            const mrReceived   = itemsForProj.length;
            const prGenItems   = itemsForProj.filter(it => it.prNo);
            const prGenerated  = prGenItems.length;
            const pendingPR    = Math.max(0, mrReceived - prGenerated);
            const poGiven      = prGenItems.filter(it => ['PROCUREMENT','PARTIAL','CLOSED'].includes(it.status)).length;
            const receivedItems= prGenItems.filter(it => it.status === 'CLOSED').length;
            const pendingItems = Math.max(0, prGenerated - receivedItems);
            const matPct       = prGenerated > 0 ? Math.round((receivedItems / prGenerated) * 100) : 0;
            const projPrRows   = prRows.filter(r => r.costCentre === p.name);
            const delayedCount = projPrRows.filter(r => r.reqDelayDays > 0 || r.deliveryDelayDays > 0).length;
            const delayPct     = projPrRows.length > 0 ? Math.round((delayedCount / projPrRows.length) * 100) : 0;
            let planningStatus = 'No BOM / MR';
            if (mrReceived > 0) {
                if (pendingPR > 0)        planningStatus = 'Pending Planning';
                else if (matPct < 100)    planningStatus = 'In Procurement';
                else                      planningStatus = 'Completed';
            }
            return { id: p.id, name: p.name, ccNo: p.ccNo || '', priority: p.priority || '', bom: p.bomItems || 0,
                mrReceived, prGenerated, pendingPR, poGiven, receivedItems, pendingItems, matPct,
                planningStatus, delayPct, remarks: p.remarks || '' };
        });

        const workQueue = {
            pendingMrApproval: pendingPlanningMrs.length,
            pendingDirectPr:   pendingDirectPr.length,
            urgentMaterial:    prRows.filter(r => r.reqDelayDays > 10 || r.deliveryDelayDays > 10).length,
            delayedProjects:   projectRows.filter(p => p.delayPct > 0).length,
            waitingProcurement:dcSum.poPending,
            waitingVendor:     prRows.filter(r => r.status === 'PROCUREMENT').length,
            withoutBom:        (appData.projects || []).filter(p => !p.bomItems).length,
            completed:         projectRows.filter(p => p.planningStatus === 'Completed').length
        };

        const pieMap = {};
        prRows.forEach(r => {
            const key = r.costCentre || 'Unassigned';
            pieMap[key] = (pieMap[key] || 0) + 1;
        });
        const pieData = Object.entries(pieMap)
            .map(([name, value]) => ({ name, value }))
            .filter(p => p.value > 0)
            .sort((a, b) => b.value - a.value);

        const monthCounts = {};
        const isPrGenAction = (action) => /planning approved|combined pr|pr generated/i.test(action || '');
        mrs.forEach(m => {
            if (!m.prNumber) return;
            const histEntry = (m.history || []).find(h => isPrGenAction(h.action));
            const ts = m.planningDate || (histEntry && histEntry.ts) || m.createdAt;
            if (!ts) return;
            const d = new Date(ts);
            const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            monthCounts[key] = (monthCounts[key] || 0) + 1;
        });
        const monthLabels = [], monthValues = [];
        const now = new Date();
        for (let i = 11; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
            monthLabels.push(d.toLocaleDateString('en-IN', { month: 'short' }));
            monthValues.push(monthCounts[key] || 0);
        }

        const timeline = [];
        mrs.forEach(m => (m.history || []).forEach(h => {
            timeline.push({ ts: h.ts, action: h.action, actor: h.actor, mrNo: m.mrNumber, prNo: m.prNumber });
        }));
        timeline.sort((a,b) => b.ts - a.ts);

        const upcoming = allItems
            .filter(it => it.requiredDate && it.status !== 'CLOSED' && it.status !== 'CANCELLED')
            .map(it => {
                const rd = new Date(it.requiredDate); rd.setHours(0,0,0,0);
                const daysRemaining = Math.round((rd - today) / 86400000);
                let bucket = 'safe';
                if (daysRemaining < 0) bucket = 'overdue';
                else if (daysRemaining <= 7) bucket = 'upcoming';
                return { project: it.project || '', item: it.name || '', requiredDate: it.requiredDate,
                    daysRemaining, status: it.status, bucket };
            })
            .sort((a,b) => a.daysRemaining - b.daysRemaining);

        return {
            pendingPlanningMrs: pendingPlanningMrs.length, pendingDirectPr: pendingDirectPr.length,
            prGeneratedToday, totalPrGenerated, pendingProcurement: dcSum.poPending,
            projectsWaitingMaterial: projectRows.filter(p => p.pendingPR > 0 || p.pendingItems > 0).length,
            delayedPlanning: workQueue.delayedProjects, completedPlanning: workQueue.completed,
            projectRows, pieData, monthLabels, monthValues, workQueue, timeline, upcoming
        };
    }

    function buildPcbChartConfig(type, labels, values, label, chartOpts) {
        chartOpts = chartOpts || {};
        const palette = CHART_PALETTE;
        const colors = values.map((_, i) => palette[i % palette.length]);
        const isCartesian = type === 'bar' || type === 'line';
        const tooltipCallbacks = {
            label: (ctx) => {
                const v = ctx.raw;
                if (isCartesian) return ` ${label}: ${v}`;
                const total = ctx.dataset.data.reduce((a, b) => a + (Number(b) || 0), 0);
                const pct = total ? Math.round((v / total) * 100) : 0;
                return ` ${ctx.label}: ${v} (${pct}%)`;
            }
        };
        if (isCartesian) {
            const horizontal = chartOpts.horizontal || (type === 'bar' && labels.length > 5);
            return {
                type,
                data: {
                    labels,
                    datasets: [{
                        label,
                        data: values,
                        backgroundColor: type === 'line' ? 'rgba(14,116,144,0.15)' : colors,
                        borderColor: type === 'line' ? '#0E7490' : colors,
                        borderWidth: type === 'line' ? 2 : 1,
                        borderRadius: type === 'bar' ? 4 : 0,
                        maxBarThickness: horizontal ? 22 : 28,
                        barPercentage: 0.75,
                        categoryPercentage: 0.82,
                        fill: type === 'line',
                        tension: 0.35,
                        pointRadius: type === 'line' ? 4 : 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: horizontal ? 'y' : 'x',
                    layout: { padding: { top: 4, bottom: 4, left: 4, right: 8 } },
                    plugins: { legend: { display: false }, tooltip: { callbacks: tooltipCallbacks } },
                    scales: horizontal ? {
                        x: { beginAtZero: true, ticks: { precision: 0, font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                        y: { ticks: { font: { size: 9 }, autoSkip: false }, grid: { display: false } }
                    } : {
                        y: { beginAtZero: true, grace: '8%', ticks: { precision: 0, font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                        x: { ticks: { font: { size: 9 }, maxRotation: 0, autoSkip: false }, grid: { display: false } }
                    }
                }
            };
        }
        const roundType = type === 'doughnut' ? 'doughnut' : (type === 'polarArea' ? 'polarArea' : 'pie');
        const options = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, padding: 8 } },
                tooltip: { callbacks: tooltipCallbacks }
            }
        };
        if (roundType === 'doughnut') options.cutout = '52%';
        return {
            type: roundType,
            data: {
                labels,
                datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }]
            },
            options
        };
    }

    function pcbQueueCard(icon, value, label, type) {

    window._activePcbCharts = [];
    window.renderPcbCharts = () => {
        const ChartCtor = getChartCtor();
        if (!ChartCtor) {
            console.warn('Chart.js not loaded — check internet connection or CDN access.');
            return;
        }
        window._activePcbCharts.forEach(c => { try { c.destroy(); } catch (e) {} });
        window._activePcbCharts = [];
        const d = window.currentPcbData || computePlanningControlData();
        window.currentPcbData = d;

        const projectCtx = document.getElementById('pcb-project-chart');
        if (projectCtx) {
            const labels = d.pieData.length ? d.pieData.map(p => p.name) : ['No data'];
            const values = d.pieData.length ? d.pieData.map(p => p.value) : [1];
            const pType = pcbChartTypes.project || 'pie';
            const cfg = buildPcbChartConfig(pType, labels, values, 'PR Line Items', { horizontal: pType === 'bar' && labels.length > 4 });
            if (!d.pieData.length && ['pie', 'doughnut', 'polarArea'].includes(pType)) {
                cfg.data.datasets[0].backgroundColor = ['#e2e8f0'];
            }
            const projectBox = document.getElementById('pcb-project-chart-box');
            if (projectBox) {
                if (pType === 'bar' && labels.length > 4) {
                    projectBox.style.height = Math.min(400, Math.max(256, labels.length * 30)) + 'px';
                } else {
                    projectBox.style.height = '256px';

    function buildProcBarConfig(labels, values, color, pct) {
        const horizontal = labels.length > 4;
        return {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: pct ? 'Completion %' : 'Assigned Items',
                    data: values,
                    backgroundColor: color,
                    borderRadius: 4,
                    maxBarThickness: horizontal ? 22 : 28,
                    barPercentage: 0.75,
                    categoryPercentage: 0.82
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: horizontal ? 'y' : 'x',
                layout: { padding: { top: 4, bottom: 4, left: 4, right: 8 } },
                plugins: { legend: { display: false } },
                scales: horizontal ? {
                    x: { beginAtZero: true, max: pct ? 100 : undefined, ticks: { precision: 0, font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                    y: { ticks: { font: { size: 9 }, autoSkip: false }, grid: { display: false } }
                } : {
                    y: { beginAtZero: true, max: pct ? 100 : undefined, grace: '8%', ticks: { precision: 0, font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                    x: { ticks: { font: { size: 9 }, maxRotation: 0, autoSkip: false }, grid: { display: false } }
                }
            }
        };
    }

    // ── DATA CENTRE (PROCUREMENT MASTER GRID) ───────────────────────────────
    // All procurement work (PO issuance, receipt, hold/cancel, remarks) now happens
    // exclusively inline inside the Data Centre grid below — there is no separate
    // Procurement page/module anymore.
    function buildPrRows() {
        const rows = [];
        const today = new Date(); today.setHours(0,0,0,0);
        const projectCcMap = {};
        appData.projects.forEach(p => { if (p && p.name) projectCcMap[p.name] = p.ccNo || ''; });
        (appData.mrs || []).forEach(mr => {
            // Only PRs (MRs that have cleared Planning Approval) ever appear in the Data Centre.
            if (!mr.prNumber) return;
            (mr.items || []).forEach((it, idx) => {
                const itStatus = it.status || 'PLANNED';
                const receivedLike = (itStatus === 'CLOSED');
                // Requirement Delay: Tentative Required Date vs Today.
                let reqDelay = 0;
                if (it.requiredDate && !receivedLike) {
                    const rd = new Date(it.requiredDate); rd.setHours(0,0,0,0);
                    const diff = Math.round((today - rd) / 86400000);
                    if (diff > 0) reqDelay = diff;
                }
                // Delivery Delay: Tentative Delivery Date vs Today (only while still outstanding) — now per item.
                let deliveryDelay = 0;
                if (it.tentativeDeliveryDate && !it.materialReceivedDate && !receivedLike) {
                    const dd = new Date(it.tentativeDeliveryDate); dd.setHours(0,0,0,0);
                    const diff = Math.round((today - dd) / 86400000);
                    if (diff > 0) deliveryDelay = diff;
                }
                const amount = it.amount != null ? it.amount : (Number(it.qty||0) * Number(it.rate||0));
                const qtyNum = Number(it.qty) || 0;
                // Cancelled/on-hold lines don't count toward outstanding pending qty.
                const receivedQty = (itStatus === 'CANCELLED') ? 0 : Math.min(qtyNum, Number(it.receivedQty) || 0);
                const pendingQty = Math.max(0, qtyNum - receivedQty);
                const itemCompletionPct = qtyNum > 0 ? +( (receivedQty / qtyNum) * 100 ).toFixed(1) : 0;
                rows.push({
                    mrId: mr.id, itemIdx: idx,
                    mrNo: mr.mrNumber, prNo: mr.prNumber, source: mr.source || 'MR_BASED', date: mr.createdAt,
                    refMrNo: it.refMrNumber || mr.mrNumber,
                    item: it.name || '', spec: it.spec || '', sampleMake: it.make || '',
                    qty: qtyNum, unit: it.unit || '', rate: Number(it.rate)||0, amount,
                    receivedQty, pendingQty, itemCompletionPct,
                    reqDate: it.requiredDate || '', costCentre: it.project || '', ccNo: projectCcMap[it.project] || '', revision: mr.revNo || 0,
                    deliveryLoc: mr.deliveryLocation || '', dept: mr.dept || '', plannedBy: mr.plannedBy || '',
                    status: itStatus, poNo: it.poNumber || '', poDate: it.poDate || '',
                    prHandleBy: it.procEngineer || '', vendor: it.vendor || '',
                    tentDelivery: it.tentativeDeliveryDate || '', actualDelivery: it.actualDeliveryDate || '',
                    materialReceived: it.materialReceivedDate || '',
                    reqDelayDays: reqDelay, deliveryDelayDays: deliveryDelay,
                    remarks: it.procRemarks || '',
                    holdCancelReason: it.holdCancelReason || '', holdCancelJustification: it.holdCancelJustification || '',
                    holdCancelUpdatedBy: it.holdCancelUpdatedBy || '', holdCancelTs: it.holdCancelTs || null
                });
            });
        });
        return rows;
    }

    function dcFilteredRows() {
        let rows = buildPrRows();
        if (!canSeeAllDepartmentMrs()) {
            rows = rows.filter(r => (r.dept || '').trim() === (user.dept || '').trim());
        }
        const gq = dcGlobalQ.trim().toLowerCase();
        if (gq) {
            rows = rows.filter(r => Object.values(r).some(v => String(v ?? '').toLowerCase().includes(gq)));
        }
        Object.keys(dcColFilter).forEach(k => {
            const f = (dcColFilter[k] || '').trim().toLowerCase();
            if (!f) return;
            rows = rows.filter(r => String(r[k] ?? '').toLowerCase().includes(f));
        });
        const todayStr = fmtDateInput(Date.now());
        if (dcPreset === 'req_delay')       rows = rows.filter(r => r.reqDelayDays > 0);
        if (dcPreset === 'delivery_delay')  rows = rows.filter(r => r.deliveryDelayDays > 0);
        if (dcPreset === 'pending_proc')    rows = rows.filter(r => r.status === 'PLANNED' && !r.poNo);
        if (dcPreset === 'today_delivery')  rows = rows.filter(r => r.tentDelivery === todayStr);
        if (dcPreset === 'overdue_delivery')rows = rows.filter(r => r.deliveryDelayDays > 0);
        if (dcPreset === 'pending_pr_project') rows = rows.filter(r => !['CLOSED', 'CANCELLED'].includes(r.status));
        const { key, dir } = dcSort;
        rows.sort((a, b) => {
            let av = a[key], bv = b[key];
            if (typeof av === 'string') av = av.toLowerCase();
            if (typeof bv === 'string') bv = bv.toLowerCase();
            if (av < bv) return dir === 'asc' ? -1 : 1;
            if (av > bv) return dir === 'asc' ? 1 : -1;
            return 0;
        });
        return rows;
    }

    window.dcSetGlobalQ = (val) => { dcGlobalQ = val; dcPage = 1; softRender(); };
    window.dcSetColFilter = (key, val) => { dcColFilter[key] = val; dcPage = 1; softRender(); };
    window.dcSort = (key) => {
        dcSort = { key, dir: (dcSort.key === key && dcSort.dir === 'asc') ? 'desc' : 'asc' };
        render();
    };
    window.dcClearFilters = () => { dcGlobalQ = ''; dcColFilter = {}; dcSort = { key:'date', dir:'desc' }; dcPreset = null; render(); };
    window.dcToggleCol = (key) => {
        if (DC_FROZEN_KEYS.includes(key)) return; // MR No / PR No are always visible & frozen
        dcHidden.has(key) ? dcHidden.delete(key) : dcHidden.add(key);
        saveDcLayout();
        render();
    };
    window.dcToggleColsPanel = () => { dcShowCols = !dcShowCols; render(); };
    window.dcSetPage = (p) => { dcPage = p; render(); };
    window.dcCopyCell = (val) => {
        navigator.clipboard?.writeText(String(val ?? '')).catch(()=>{});
        showToast('Copied');
    };
    window.dcResetLayout = () => {
        dcColOrder = DC_COLUMNS.map(c => c.key);
        dcColWidths = {};
        dcHidden = new Set();
        localStorage.removeItem(DC_LAYOUT_KEY);
        render();
    };
    function dcColWidth(c) { return dcColWidths[c.key] || c.w; }
    // Reorders DC_COLUMNS according to the user's saved dcColOrder, frozen columns always first.
    function dcOrderedColumns(cols) {
        const byKey = new Map(cols.map(c => [c.key, c]));
        const ordered = [];
        DC_FROZEN_KEYS.forEach(k => { if (byKey.has(k)) { ordered.push(byKey.get(k)); byKey.delete(k); } });
        dcColOrder.forEach(k => { if (byKey.has(k)) { ordered.push(byKey.get(k)); byKey.delete(k); } });
        byKey.forEach(c => ordered.push(c)); // any column not yet in dcColOrder (e.g. newly added)
        return ordered;
    }

    // Column resize: drag the handle at the right edge of a header cell. We mutate widths
    // directly during the drag for a smooth feel, then leave the result in dcColWidths so it
    // persists across the next render (and is saved to the layout on mouseup).
    window.dcStartResize = (e, key) => {
        e.preventDefault(); e.stopPropagation();
        const col = DC_COLUMNS.find(c => c.key === key);
        if (!col) return;
        const startX = e.clientX;
        const startW = dcColWidths[key] || col.w;
        const onMove = (ev) => {
            const w = Math.max(50, startW + (ev.clientX - startX));
            dcColWidths[key] = w;
            document.querySelectorAll(`[data-col-key="${key}"]`).forEach(el => {
                el.style.minWidth = w + 'px'; el.style.maxWidth = w + 'px'; el.style.width = w + 'px';
            });
        };
        const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            saveDcLayout();
            render();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    };

    // Column drag & drop reorder: drag a header by its label, drop it onto another header to
    // reposition it in dcColOrder. Frozen columns (MR No / PR No) can't be dragged or dropped-onto.
    window.dcColDragStart = (e, key) => {
        if (DC_FROZEN_KEYS.includes(key)) { e.preventDefault(); return; }
        dcDragKey = key;
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', key); } catch(err) {}
    };
    window.dcColDragOver = (e, key) => {
        if (DC_FROZEN_KEYS.includes(key)) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    };
    window.dcColDrop = (e, targetKey) => {
        e.preventDefault();
        const dragKey = dcDragKey;
        dcDragKey = null;
        if (!dragKey || dragKey === targetKey || DC_FROZEN_KEYS.includes(targetKey) || DC_FROZEN_KEYS.includes(dragKey)) return;
        const order = dcColOrder.filter(k => k !== dragKey);
        const targetPos = order.indexOf(targetKey);
        order.splice(targetPos === -1 ? order.length : targetPos, 0, dragKey);
        dcColOrder = order;
        saveDcLayout();
        render();
    };

    // Excel-style keyboard navigation between editable Data Centre cells: Up/Down/Enter move
    // between rows in the same column; the browser's own Tab order already moves across columns.
    window.dcNavKey = (e, r, c) => {
        if (!['ArrowUp','ArrowDown','Enter'].includes(e.key)) return;
        e.preventDefault();
        const targetR = (e.key === 'ArrowUp') ? r - 1 : r + 1;
        const el = document.getElementById(`dc-in-${targetR}-${c}`);
        if (el) { el.focus(); if (el.select) el.select(); }
    };

    // Small non-blocking green confirmation, shown directly via the DOM (not through render())
    // so an in-progress inline edit never loses focus while it's on screen.
    function showToast(msg) {
        let el = document.getElementById('dc-toast');
        if (!el) {
            el = document.createElement('div');
            el.id = 'dc-toast';
            el.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:2000;background:#047857;color:#fff;font-weight:700;font-size:12px;letter-spacing:.03em;padding:10px 18px;border-radius:10px;box-shadow:0 8px 24px -8px rgba(4,120,87,0.5);display:flex;align-items:center;gap:8px;transition:opacity .25s, transform .25s;pointer-events:none;';
            document.body.appendChild(el);
        }
        el.innerHTML = `<span style="width:7px;height:7px;border-radius:999px;background:#fff;display:inline-block;"></span>${esc(msg)}`;
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; }, 2000);
    }

    // Data Centre editable columns now map onto per-ITEM fields (each line item can have its
    // own PO / vendor / engineer / delivery dates / status), not the parent MR.
    const DC_FIELD_MAP = {
        status: 'status', poNo: 'poNumber', poDate: 'poDate', prHandleBy: 'procEngineer', vendor: 'vendor',
        tentDelivery: 'tentativeDeliveryDate',
        remarks: 'procRemarks'
    };
    const DC_FIELD_LABEL = {
        status: 'Status', poNo: 'PO Number', poDate: 'PO Date', prHandleBy: 'Procurement Engineer', vendor: 'Vendor',
        tentDelivery: 'Tentative Delivery Date',
        remarks: 'Remarks'
    };

    // Marks that there is at least one unsaved edit in the Data Centre — used to drive the
    // Save button's highlighted state and the leave-without-saving confirmation.
    function dcMarkDirty() {
        dcDirty = true;
        dcSyncSaveButton();
    }

    // Most Data Centre cell edits deliberately avoid a full render() (it would steal focus out
    // of whatever cell you're typing in), so the Save button's on/off styling would otherwise
    // stay stuck at "no changes" (greyed out, looks disabled) even after you've made an edit.
    // This directly flips the button's classes/title in the DOM the instant a change is staged.
    function dcSyncSaveButton() {
        const btn = document.getElementById('dc-save-btn');
        if (!btn) return;
        btn.title = dcDirty ? 'Save Changes' : 'No unsaved changes';
        btn.classList.toggle('bg-emerald-600', dcDirty);
        btn.classList.toggle('border-emerald-600', dcDirty);
        btn.classList.toggle('text-white', dcDirty);
        btn.classList.toggle('shadow-lg', dcDirty);
        btn.classList.toggle('bg-white', !dcDirty);
        btn.classList.toggle('border-rule', !dcDirty);
        btn.classList.toggle('text-slate-400', !dcDirty);
        btn.classList.toggle('opacity-70', !dcDirty);
    }

    // Status changes to Hold or Cancel must collect a mandatory Reason + Justification before
    // they can be staged — this opens that confirmation modal instead of writing immediately.
    window.dcRequestStatusChange = (mrId, itemIdx, newStatus) => {
        const mr = appData.mrs.find(m => m.id === mrId);
        const it = mr && mr.items && mr.items[itemIdx];
        if (!mr || !it) return;
        if (!dcStatusOptions(it.status).includes(newStatus)) {
            alert("This item has already moved past PO Given and cannot be sent back to an earlier stage.");
            softRender();
            return;
        }
        if (newStatus === 'PROCUREMENT' && it.status !== 'PROCUREMENT' && (!it.poNumber || !it.poDate)) {
            alert("Please enter both PO Number and PO Date before issuing the Purchase Order.");
            softRender();
            return;
        }
        if (newStatus === 'HOLD' || newStatus === 'CANCELLED') {
            dcHoldCancelModal = { mrId, itemIdx, status: newStatus, prevStatus: it.status };
            render();
            return;
        }
        window.dcUpdateItemField(mrId, itemIdx, 'status', newStatus);
    };

    window.dcCloseHoldCancelModal = () => { dcHoldCancelModal = null; render(); };

    window.dcCommitHoldCancel = () => {
        if (!dcHoldCancelModal) return;
        const reasonEl = document.getElementById('hc-reason');
        const justEl   = document.getElementById('hc-justification');
        const reason = reasonEl ? reasonEl.value.trim() : '';
        const justification = justEl ? justEl.value.trim() : '';
        if (!reason || !justification) {
            alert('Both Reason and Justification are mandatory before this status can be saved.');
            return;
        }
        const { mrId, itemIdx, status, prevStatus } = dcHoldCancelModal;
        const mr = appData.mrs.find(m => m.id === mrId);
        const it = mr && mr.items && mr.items[itemIdx];
        if (!mr || !it) { dcHoldCancelModal = null; render(); return; }
        it.status = status;
        it.holdCancelReason = reason;
        it.holdCancelJustification = justification;
        it.holdCancelUpdatedBy = user.name;
        it.holdCancelTs = Date.now();
        mr.history = mr.history || [];
        mr.history.push({
            action: 'Data Centre: Status', actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
            field: 'status', oldValue: STATUS_META[prevStatus]?.label || prevStatus, newValue: STATUS_META[status]?.label || status,
            note: `${it.name || 'Item'} — Reason: ${reason} | Justification: ${justification}`
        });
        dcHoldCancelModal = null;
        dcMarkDirty();
        showToast('Marked — click Save to write changes');
    };

    // Once every line item on a PR has its Received Qty filled in to match its ordered Qty, that
    // item auto-advances to "Received" (CLOSED); a partial fill auto-advances it to "Partial
    // Received". Only fires once a PO exists on that item and it isn't already Hold/Cancelled.
    function checkAutoReceiptStatus(mr, item) {
        if (!item.poNumber || ['HOLD','CANCELLED'].includes(item.status)) return false;
        const qty = Number(item.qty) || 0;
        const recvQty = Math.min(qty, Number(item.receivedQty) || 0);
        let target = null;
        if (qty > 0 && recvQty >= qty) target = 'CLOSED';
        else if (recvQty > 0) target = 'PARTIAL';
        else if (item.status === 'PARTIAL' || item.status === 'CLOSED') target = 'PROCUREMENT'; // qty was reduced back to 0
        if (target && target !== item.status) {
            const oldStatus = item.status;
            item.status = target;
            mr.history = mr.history || [];
            mr.history.push({ action: 'Receipt Qty Updated (Auto Status)', actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field: 'status', oldValue: STATUS_META[oldStatus]?.label || oldStatus, newValue: STATUS_META[target]?.label || target,
                note: `${item.name || 'Item'} — Received ${recvQty} of ${qty}.` });
            return true;
        }
        return false;
    }

    // Single entry point for every editable Data Centre cell — stages the change in memory
    // (so the grid updates immediately) and marks the Data Centre dirty. Nothing is written to
    // localStorage here; that only happens when the user clicks Save (window.dcSaveChanges).
    window.dcUpdateItemField = (mrId, itemIdx, field, val) => {
        const mr = appData.mrs.find(m => m.id === mrId);
        const it = mr && mr.items && mr.items[itemIdx];
        if (!mr || !it) return;
        dcSnapshotForUndo();

        if (field === 'receivedQty') {
            const qty = Number(it.qty) || 0;
            let v = Number(val);
            if (isNaN(v) || v < 0) v = 0;
            if (v > qty) v = qty;
            const oldVal = Number(it.receivedQty) || 0;
            it.receivedQty = v;
            const autoAdvanced = checkAutoReceiptStatus(mr, it);
            mr.history = mr.history || [];
            mr.history.push({ action: 'Data Centre: Received Qty', actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field: 'receivedQty', oldValue: String(oldVal), newValue: String(v),
                note: `${esc(it.name)} — Received ${v} / ${qty} ${esc(it.unit)}${autoAdvanced ? ' (status auto-updated)' : ''}` });
            dcMarkDirty();
            showToast('Marked — click Save to write changes');
            return;
        }

        const dbKey = DC_FIELD_MAP[field];
        if (!dbKey) return;

        if (field === 'status') {
            // Hold/Cancel is handled by dcRequestStatusChange + the mandatory-comment modal.
            if (val === 'HOLD' || val === 'CANCELLED') { window.dcRequestStatusChange(mrId, itemIdx, val); return; }
            if (!dcStatusOptions(it.status).includes(val)) {
                alert("This item has already moved past PO Given and cannot be sent back to an earlier stage.");
                softRender();
                return;
            }
            if (val === 'PROCUREMENT' && it.status !== 'PROCUREMENT' && (!it.poNumber || !it.poDate)) {
                alert("Please enter both PO Number and PO Date before issuing the Purchase Order.");
                softRender();
                return;
            }
        }

        const oldVal = it[dbKey];
        it[dbKey] = val;
        const autoAdvanced = (field === 'poNo' || field === 'poDate') ? checkAutoPoGiven(mr, it) : false;

        mr.history = mr.history || [];
        if (!autoAdvanced) {
            const oldLabel = field === 'status' ? (STATUS_META[oldVal]?.label || oldVal || '—') : (oldVal || '—');
            const newLabel = field === 'status' ? (STATUS_META[val]?.label || val) : (val || '—');
            mr.history.push({
                action: 'Data Centre: ' + (DC_FIELD_LABEL[field] || field), actor: user.name, role: user.role, dept: user.dept, ts: Date.now(),
                field, oldValue: oldLabel, newValue: newLabel, note: `${esc(it.name)} — ${String(val ?? '')}`
            });
        }
        dcMarkDirty();
        showToast('Marked — click Save to write changes');
    };

    // Writes every staged Data Centre edit to localStorage in one go. This is the ONLY place
    // that persists Data Centre edits — there is no auto save.
    window.dcSaveChanges = () => {
        if (document.activeElement && typeof document.activeElement.blur === 'function') {
            document.activeElement.blur();
        }
        if (!dcDirty) { showToast('Nothing to save'); return; }
        syncAllMrStatuses();
        saveDB(appData);
        window.appData = appData;
        dcDirty = false;
        dcUndoStack = [];
        dcRedoStack = [];
        const pendingLeave = dcLeaveIntent;
        dcLeaveIntent = null;
        showToast('Changes Saved Successfully');
        render();
        if (pendingLeave) window.dcResolveLeave(pendingLeave);
    };

    // Discards everything staged since the last Save by reloading appData straight from
    // localStorage (i.e. the last saved state), then continues any pending navigation.
    window.dcDiscardChanges = () => { appData = loadFromLocalStorage();
        window.appData = appData;
        dcDirty = false;
        dcUndoStack = [];
        dcRedoStack = [];
        const pendingLeave = dcLeaveIntent;
        dcLeaveIntent = null;
        render();
        if (pendingLeave) window.dcResolveLeave(pendingLeave);
    };

    window.dcCancelLeave = () => { dcLeaveIntent = null; render(); };

    // ── DATA CENTRE: UNDO / REDO ──────────────────────────────────────────
    // Steps back/forward through staged (unsaved) edits only. Once Save is clicked the
    // stacks are cleared, since that state is now the committed baseline.
    window.dcUndo = () => {
        if (!dcUndoStack.length) { showToast('Nothing to undo'); return; }
        dcRedoStack.push(JSON.stringify(appData.mrs));
        const prev = dcUndoStack.pop();
        appData.mrs = JSON.parse(prev);
        window.appData = appData;
        dcMarkDirty();
        showToast('Undone');
        render();
    };
    window.dcRedo = () => {
        if (!dcRedoStack.length) { showToast('Nothing to redo'); return; }
        dcUndoStack.push(JSON.stringify(appData.mrs));
        const next = dcRedoStack.pop();
        appData.mrs = JSON.parse(next);
        window.appData = appData;
        dcMarkDirty();
        showToast('Redone');
        render();
    };
    document.addEventListener('keydown', (e) => {
        if (activeTab !== 'data_centre') return;
        const tag = (document.activeElement && document.activeElement.tagName) || '';
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); window.dcUndo(); }
        else if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); window.dcRedo(); }
    });

    // ── DATA CENTRE: SAVED FILTER PRESETS ─────────────────────────────────
    // Named, reusable views a user can save and re-apply — separate from the built-in
    // dashboard-card presets (dcPreset), which remain unchanged.
    window.dcSaveCurrentFilterAsPreset = () => {
        const name = prompt('Name this saved view (e.g. "My Pending POs"):');
        if (!name || !name.trim()) return;
        const trimmed = name.trim();
        dcSavedFilters = dcSavedFilters.filter(f => f.name.toLowerCase() !== trimmed.toLowerCase());
        dcSavedFilters.push({
            name: trimmed,
            globalQ: dcGlobalQ,
            colFilter: { ...dcColFilter },
            sort: { ...dcSort },
        });
        try { localStorage.setItem(DC_SAVED_FILTERS_KEY, JSON.stringify(dcSavedFilters)); } catch(e) {}
        showToast(`Saved view "${trimmed}"`);
        render();
    };
    window.dcApplySavedFilter = (name) => {
        const f = dcSavedFilters.find(x => x.name === name);
        if (!f) return;
        dcGlobalQ = f.globalQ || '';
        dcColFilter = { ...(f.colFilter || {}) };
        dcSort = { ...(f.sort || { key:'date', dir:'desc' }) };
        dcPreset = null;
        dcPage = 1;
        render();
    };
    window.dcDeleteSavedFilter = (name) => {
        if (!confirm(`Delete saved view "${name}"?`)) return;
        dcSavedFilters = dcSavedFilters.filter(f => f.name !== name);
        try { localStorage.setItem(DC_SAVED_FILTERS_KEY, JSON.stringify(dcSavedFilters)); } catch(e) {}
        render();
    };
    window.dcPromptDeleteSavedFilter = () => {
        if (!dcSavedFilters.length) return;
        const list = dcSavedFilters.map((f,i) => `${i+1}. ${f.name}`).join('\n');
        const pick = prompt(`Enter the number of the saved view to delete:\n${list}`);
        const idx = Number(pick) - 1;
        if (isNaN(idx) || idx < 0 || idx >= dcSavedFilters.length) return;
        window.dcDeleteSavedFilter(dcSavedFilters[idx].name);
    };

    // ── DATA CENTRE: RIGHT-CLICK CONTEXT MENU ─────────────────────────────
    window.dcOpenContextMenu = (e, mrId, itemIdx) => {
        e.preventDefault();
        dcContextMenu = { x: e.clientX, y: e.clientY, mrId, itemIdx };
        render();
    };
    window.dcCloseContextMenu = () => { dcContextMenu = null; render(); };
    function renderDcContextMenu() {
        const m = dcContextMenu;
        if (!m) return '';
        const mr = appData.mrs.find(x => x.id === m.mrId);
        const it = mr && mr.items && mr.items[m.itemIdx];
        if (!mr || !it) return '';
        const item = (label, icon, onclick, disabled) => `
            <button ${disabled ? 'disabled' : `onclick="${onclick}"`} class="w-full text-left px-4 py-2 text-[11px] font-bold flex items-center gap-2 ${disabled ? 'text-slate-300 cursor-not-allowed' : 'text-slate-700 hover:bg-paper'}">
                <i data-lucide="${icon}" class="w-3.5 h-3.5"></i> ${label}
            </button>`;
        const copyStr = `${it.name || ''} | PR ${mr.prNumber || '—'} | ${it.qty || ''} ${it.unit || ''}`;
        return `
        <div class="no-print" onclick="window.dcCloseContextMenu()" style="position:fixed; inset:0; z-index:1998;"></div>
        <div class="no-print bg-white border border-rule rounded-xl shadow-2xl py-1.5" style="position:fixed; left:${m.x}px; top:${m.y}px; z-index:1999; min-width:200px;">
            ${item('View Audit Trail', 'history', `window.dcCloseContextMenu(); window.showAudit('${mr.id}')`)}
            ${item('Copy Row (Item + PR No.)', 'copy', `window.dcCloseContextMenu(); window.dcCopyCell('${esc(copyStr)}')`)}
            ${item('Print Combined PR', 'printer', `window.dcCloseContextMenu(); window.printMR('${mr.id}')`, !mr.prNumber)}
            ${canReassign() ? item('Reassign Handler', 'repeat', `window.dcCloseContextMenu(); window.openReassignModal('${mr.id}',${m.itemIdx})`) : ''}
        </div>`;
    }

    function renderDcHoldCancelModal() {
        const m = dcHoldCancelModal;
        if (!m) return '';
        const label = m.status === 'HOLD' ? 'Hold' : 'Cancel';
        return `
        <div class="fixed inset-0 bg-ink/70 backdrop-blur-sm z-[1000] flex items-center justify-center p-4" style="position:fixed;inset:0;background:rgba(11,20,32,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                <div class="px-8 py-6 border-b border-rule flex justify-between items-center bg-paper/60">
                    <div>
                        <h2 class="text-lg font-display font-bold uppercase tracking-widest">${label} Item</h2>
                        <p class="text-[10px] text-slate-500 mt-1">Reason and justification are mandatory before this status can be saved.</p>
                    </div>
                    <button onclick="window.dcCloseHoldCancelModal()" class="text-slate-400 bg-white p-1 border border-rule rounded-lg hover:text-brand"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-8 space-y-4">
                    <div><label class="field-label">Reason *</label><input id="hc-reason" class="glass-input bg-paper" placeholder="Brief reason for ${label.toLowerCase()}..." /></div>
                    <div><label class="field-label">Justification *</label><textarea id="hc-justification" class="glass-input bg-paper min-h-[90px]" placeholder="Detailed justification..."></textarea></div>
                    <button onclick="window.dcCommitHoldCancel()" class="w-full bg-brand text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-xl active:scale-95 transition-all mt-2">Confirm ${label}</button>
                </div>
            </div>
        </div>`;
    }

    function renderDcLeaveModal() {
        return `
        <div class="fixed inset-0 bg-ink/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 fade-in">
            <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] border border-rule">
                <div class="p-6 text-center">
                    <div class="w-16 h-16 bg-amberx-light rounded-full flex items-center justify-center mx-auto mb-4 border border-amberx/20 text-amberx">
                        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-xl font-display font-bold text-ink mb-2">Unsaved Changes Detected</h2>
                    <p class="text-xs text-slate-500 font-medium">You have unsaved changes in the Data Centre.<br>Do you want to save before leaving?</p>
                </div>
                <div class="bg-slate-50 p-4 border-t border-rule flex flex-col gap-2">
                    <button onclick="window.dcSaveChanges()" class="w-full bg-emerald-600 text-white rounded-xl py-3 font-black text-[10px] uppercase tracking-widest hover:bg-emerald-700 shadow-md">Save & Continue</button>
                    <button onclick="window.dcDiscardChanges()" class="w-full bg-white border border-rule text-slate-600 rounded-xl py-3 font-black text-[10px] uppercase tracking-widest hover:bg-slate-100">Leave Without Saving</button>
                    <button onclick="window.dcCancelLeave()" class="w-full text-slate-400 py-3 font-black text-[10px] uppercase tracking-widest hover:text-slate-600">Cancel</button>
                </div>
            </div>
        </div>`;
    }

    // Executes the navigation/logout action that was paused when unsaved changes were detected.
    window.dcResolveLeave = (intent) => {
        if (!intent) return;
        if (intent.type === 'navigate') { activeTab = intent.tab; render(); }
        else if (intent.type === 'logout') {
            user = null;
            sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(SESSION_KEY);
            render();
        }
    };

    function dcSummary(rows) {
        const totalMR    = new Set(rows.map(r => r.mrNo)).size;
        const totalPR    = new Set(rows.map(r => r.prNo)).size;
        const poGiven    = new Set(rows.filter(r => r.status === 'PROCUREMENT').map(r => r.prNo)).size;
        const partial    = new Set(rows.filter(r => r.status === 'PARTIAL').map(r => r.prNo)).size;
        const received   = new Set(rows.filter(r => r.status === 'CLOSED').map(r => r.prNo)).size;
        const hold       = new Set(rows.filter(r => r.status === 'HOLD').map(r => r.prNo)).size;
        const cancel     = new Set(rows.filter(r => r.status === 'CANCELLED').map(r => r.prNo)).size;
        const poPending  = new Set(rows.filter(r => r.status === 'PLANNED' && !r.poNo).map(r => r.prNo)).size;
        const reqDelayDays      = rows.reduce((s,r) => s + Math.max(0, r.reqDelayDays||0), 0);
        const deliveryDelayDays = rows.reduce((s,r) => s + Math.max(0, r.deliveryDelayDays||0), 0);
        const overdueDeliveries = new Set(rows.filter(r => r.deliveryDelayDays > 0).map(r => r.prNo)).size;
        const critical   = rows.filter(r => Math.max(r.reqDelayDays||0, r.deliveryDelayDays||0) > 15).length;
        const value      = rows.reduce((s,r) => s + (Number(r.amount)||0), 0);
        const todayStr   = fmtDateInput(Date.now());
        const tomorrow   = fmtDateInput(Date.now() + 86400000);
        const todayDel   = new Set(rows.filter(r => r.tentDelivery === todayStr).map(r => r.prNo)).size;
        const tmrwDel    = new Set(rows.filter(r => r.tentDelivery === tomorrow).map(r => r.prNo)).size;
        return { totalMR, totalPR, poGiven, partial, received, hold, cancel, poPending,
                 reqDelayDays, deliveryDelayDays, overdueDeliveries, critical, value, todayDel, tmrwDel };
    }

    function dcCard(val, label, color, onclick) {
        return `<div ${onclick?`onclick="${onclick}"`:''} class="bg-white rounded-xl border border-rule px-4 py-3 min-w-[130px] ${onclick?'cursor-pointer hover:border-brand/40 hover:shadow-md transition-all':''}">
            <p class="text-xl font-display font-bold" style="color:${color}">${val}</p>
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-0.5">${label}</p>
        </div>`;
    }

    function renderDataCentre() {
        const canEdit = (user.role === 'admin' || user.role === 'procurement');
        const allRows = dcFilteredRows();
        const summary = dcSummary(allRows);
        const totalPages = Math.max(1, Math.ceil(allRows.length / dcPageSize));
        if (dcPage > totalPages) dcPage = totalPages;
        const pageRows = allRows.slice((dcPage-1)*dcPageSize, dcPage*dcPageSize);
        const cols = dcOrderedColumns(DC_COLUMNS.filter(c => !dcHidden.has(c.key)));
        const handlerNames = activeProcHandlers().map(h => h.name);

        const holdCancelTooltip = (r) => {
            if (r.status !== 'HOLD' && r.status !== 'CANCELLED') return '';
            const lines = [
                `Reason: ${r.holdCancelReason || '—'}`,
                `Justification: ${r.holdCancelJustification || '—'}`,
                `Updated By: ${r.holdCancelUpdatedBy || '—'}`,
                `Date & Time: ${r.holdCancelTs ? fmtDateTime(r.holdCancelTs) : '—'}`
            ];
            return esc(lines.join('\n'));
        };
        const cellReadonly = (r, c) => {
            const v = r[c.key];
            if (c.key === 'status') return `<span title="${holdCancelTooltip(r)}">${renderStatusBadge(v)}</span>`;
            if (c.key === 'source') return v === 'DIRECT_PR'
                ? `<span class="status-chip" style="background:#F2ECFC;color:#6D28D9;border-color:#6D28D922"><span class="dot" style="background:#6D28D9"></span>Direct PR</span>`
                : `<span class="status-chip" style="background:#EEF0FE;color:#4F46E5;border-color:#4F46E522"><span class="dot" style="background:#4F46E5"></span>MR Based</span>`;
            if (c.key === 'itemCompletionPct') {
                const pct = Number(v)||0;
                const clr = pct>=100 ? '#047857' : (pct>0 ? '#B45309' : '#94a3b8');
                return `<span style="font-weight:800;color:${clr}">${pct.toFixed(1)}%</span>`;
            }
            if (c.key === 'date') return fmtDate(v);
            if (c.key === 'reqDate' || c.key === 'poDate' || c.key === 'tentDelivery') return v ? fmtDate(v) : '—';
            if (c.num) return (typeof v === 'number') ? (c.key==='rate'||c.key==='amount' ? v.toFixed(2) : v) : (v||'—');
            return esc(String(v ?? '')) || '—';
        };
        const cellEditable = (r, c, ri, ci) => {
            const navAttrs = `data-r="${ri}" data-c="${ci}" onkeydown="window.dcNavKey(event,${ri},${ci})"`;
            if (c.editable === 'status') {
                const opts = dcStatusOptions(r.status);
                return `<span title="${holdCancelTooltip(r)}"><select id="dc-in-${ri}-${ci}" ${navAttrs} onchange="window.dcRequestStatusChange('${r.mrId}',${r.itemIdx},this.value)" style="width:100%;font-size:10px;padding:2px;border:1px solid #cbd5e1;border-radius:4px;">
                    ${opts.map(s => `<option value="${s}" ${r.status===s?'selected':''}>${STATUS_META[s].label}</option>`).join('')}
                </select></span>`;
            }
            if (c.editable === 'handler') {
                if (!r.prHandleBy) {
                    return `<select id="dc-in-${ri}-${ci}" ${navAttrs} onchange="window.dcAssignHandler('${r.mrId}',${r.itemIdx},this.value)" style="width:100%;font-size:10px;padding:2px;border:1px solid #cbd5e1;border-radius:4px;">
                        <option value="">— Unassigned —</option>
                        ${handlerNames.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('')}
                    </select>`;
                }
                const stillActive = handlerNames.includes(r.prHandleBy);
                return `<div style="display:flex;align-items:center;gap:5px;">
                    <span style="font-size:10px;font-weight:700;color:${stillActive?'#1f2937':'#94a3b8'};" title="${stillActive?'':'This handler is now Inactive'}">${esc(r.prHandleBy)}</span>
                    ${canReassign() ? `<button type="button" onclick="window.openReassignModal('${r.mrId}',${r.itemIdx})" title="Reassign" style="color:#B3122E;flex-shrink:0;"><i data-lucide="repeat" style="width:12px;height:12px;"></i></button>` : ''}
                </div>`;
            }
            if (c.editable === 'date') {
                const incomplete = (c.key === 'poDate') && r.poNo && !r.poDate;
                return `<input type="date" id="dc-in-${ri}-${ci}" ${navAttrs} value="${esc(r[c.key])}" onchange="window.dcUpdateItemField('${r.mrId}',${r.itemIdx},'${c.key}',this.value)" style="width:100%;font-size:10px;padding:2px;border:1px solid ${incomplete?'#f59e0b':'#cbd5e1'};border-radius:4px;" title="${incomplete?'Enter PO Date to auto-issue this PO':''}" />`;
            }
            if (c.key === 'poNo') {

                return `<input type="text" id="dc-in-${ri}-${ci}" ${navAttrs} value="${esc(r.poNo)}" onchange="window.dcUpdateItemField('${r.mrId}',${r.itemIdx},'poNo',this.value)" style="width:100%;font-size:10px;padding:2px;border:1px solid ${incomplete?'#f59e0b':'#cbd5e1'};border-radius:4px;" placeholder="PO Number..." title="${incomplete?'Enter PO Number to auto-issue this PO':''}" />`;
            }
            if (c.editable === 'receivedQty') {
                const disabled = !r.poNo;
                return `<input type="number" min="0" max="${r.qty}" id="dc-in-${ri}-${ci}" ${navAttrs} value="${r.receivedQty}" ${disabled?'disabled':''}

                    style="width:100%;font-size:10px;padding:2px;border:1px solid #cbd5e1;border-radius:4px;${disabled?'background:#f1f5f9;color:#94a3b8;':''}"

            }
            return `<input type="text" id="dc-in-${ri}-${ci}" ${navAttrs} value="${esc(r[c.key])}" onchange="window.dcUpdateItemField('${r.mrId}',${r.itemIdx},'${c.key}',this.value)" style="width:100%;font-size:10px;padding:2px;border:1px solid #cbd5e1;border-radius:4px;" placeholder="${c.key==='vendor'?'Vendor...':''}" />`;
        };

        return `
        <div class="flex flex-col gap-4">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-2xl font-display font-bold tracking-tight">Data Centre</h1>

                <div class="flex items-center gap-2 no-print">
                    <select onchange="if(this.value) window.dcApplySavedFilter(this.value); this.value='';" class="text-[10px] font-black uppercase tracking-widest bg-white border border-rule px-2 py-2 rounded-lg">

                    ${dcSavedFilters.length ? `<button onclick="window.dcPromptDeleteSavedFilter()" title="Delete a saved view" class="text-[10px] font-black uppercase tracking-widest bg-white border border-rule px-2 py-2 rounded-lg hover:bg-slate-50"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}

                    <button onclick="window.dcUndo()" title="Undo (Ctrl+Z)" class="text-[10px] font-black uppercase tracking-widest bg-white border border-rule px-2.5 py-2 rounded-lg hover:bg-slate-50 ${dcUndoStack.length?'':'opacity-40'}"><i data-lucide="undo-2" class="w-3.5 h-3.5"></i></button>
                    <button onclick="window.dcRedo()" title="Redo (Ctrl+Y)" class="text-[10px] font-black uppercase tracking-widest bg-white border border-rule px-2.5 py-2 rounded-lg hover:bg-slate-50 ${dcRedoStack.length?'':'opacity-40'}"><i data-lucide="redo-2" class="w-3.5 h-3.5"></i></button>
                    <button onclick="window.dcExportExcel()" class="text-[10px] font-black uppercase tracking-widest bg-white border border-rule px-3 py-2 rounded-lg hover:bg-slate-50 flex items-center gap-1.5"><i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i> Excel</button>

                    <button onclick="window.dcClearFilters()" class="text-[10px] font-black uppercase tracking-widest text-brand px-3 py-2 rounded-lg hover:bg-brand-50 flex items-center gap-1.5"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Clear Filters</button>
                </div>

            ${dcDirty ? `<div class="no-print flex items-center gap-2 bg-amberx-light border border-amberx/30 text-amberx px-4 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest">

            </div>` : ''}

            <div class="flex gap-3 flex-wrap no-print">
                ${dcCard(summary.totalMR,'Total MR','#1f2937')}
                ${dcCard(summary.totalPR,'Total PR','#1f2937')}

                ${dcCard(summary.partial,'Partial Received','#BE185D')}
                ${dcCard(summary.received,'Received','#047857')}
                ${dcCard(summary.hold,'Hold','#78716C')}
                ${dcCard(summary.cancel,'Cancel','#B91C1C')}
                ${dcCard(summary.poPending,'Pending Procurement','#B45309')}
                ${dcCard(summary.reqDelayDays,'Requirement Delay (Days)','#DC2626')}
                ${dcCard(summary.deliveryDelayDays,'Delivery Delay (Days)','#DC2626')}
                ${dcCard(summary.overdueDeliveries,'Overdue Deliveries','#7F1D1D')}
                ${dcCard('₹'+summary.value.toLocaleString('en-IN'),'Total PR Value','#334155')}
                ${dcCard(summary.todayDel,"Today's Deliveries",'#6D28D9')}
            </div>

            ${dcShowCols ? `
            <div class="bg-white border border-rule rounded-xl p-4 no-print">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Show / Hide Columns · Drag header to reorder · First two columns are frozen</p>
                    <button onclick="window.dcResetLayout()" class="text-[9px] font-black uppercase tracking-widest text-brand hover:underline">Reset Layout</button>
                </div>
                <div class="flex flex-wrap gap-x-4 gap-y-1.5">
                    ${DC_COLUMNS.map(c => `<label class="flex items-center gap-1.5 text-[11px] font-bold ${DC_FROZEN_KEYS.includes(c.key) ? 'text-slate-400' : 'text-slate-700'}">
                        <input type="checkbox" ${dcHidden.has(c.key)?'':'checked'} ${DC_FROZEN_KEYS.includes(c.key)?'disabled':''} onchange="window.dcToggleCol('${c.key}')" /> ${c.label}${DC_FROZEN_KEYS.includes(c.key)?' 🔒':''}
                    </label>`).join('')}
                </div>
            </div>` : ''}

            <div class="no-print">
                <input id="dc-global-search" value="${esc(dcGlobalQ)}" oninput="window.dcSetGlobalQ(this.value)"
                    class="glass-input max-w-md" placeholder="Search everything — PR No, item, vendor, PO, remarks..." />
            </div>

            <div class="dc-scroll bg-white border border-rule rounded-xl" style="overflow:auto; max-height:70vh;" id="dc-table-wrap">

                    <thead>
                        <tr>
                        ${(() => { let acc = 0; return cols.map(c => {

                                <span onclick="window.dcSort('${c.key}')" style="cursor:pointer;">${esc(c.label)} ${dcSort.key===c.key ? (dcSort.dir==='asc'?'▲':'▼') : ''}</span>
                                <span onmousedown="window.dcStartResize(event,'${c.key}')" title="Drag to resize" style="position:absolute; top:0; right:0; width:6px; height:100%; cursor:col-resize;"></span>
                            </th>`; }).join(''); })()}
                        </tr>
                        <tr>
                        ${(() => { let acc = 0; return cols.map(c => {
                            const w = dcColWidth(c);
                            const left = c.sticky ? acc : null;
                            if (c.sticky) acc += w;
                            return `
                            <th data-col-key="${c.key}" style="position:sticky; top:29px; ${c.sticky?`left:${left}px; z-index:3;`:'z-index:1;'} background:#f1f5f9; border:1px solid #dde3ea; padding:2px 4px;">
                                <input id="dc-col-${c.key}" data-focus-key="dc-col-${c.key}" value="${esc(dcColFilter[c.key]||'')}" oninput="window.dcSetColFilter('${c.key}', this.value)"
                                    style="width:100%; font-size:10px; padding:3px 4px; border:1px solid #cbd5e1; border-radius:4px; background:#fff;" placeholder="Filter..." />
                            </th>`; }).join(''); })()}
                        </tr>
                    </thead>
                    <tbody>
                        ${pageRows.map((r, ri) => {
                            const worstDelay = Math.max(r.reqDelayDays||0, r.deliveryDelayDays||0);
                            const rowBg = worstDelay>15?'#FEE2E2':(worstDelay>0?'#FEF3E2':(ri%2?'#fafbfc':'#fff'));
                            let acc = 0;
                            return `
                        <tr style="background:${rowBg};" oncontextmenu="window.dcOpenContextMenu(event,'${r.mrId}',${r.itemIdx})">
                            ${cols.map((c, ci) => {
                                const w = dcColWidth(c);
                                const left = c.sticky ? acc : null;
                                if (c.sticky) acc += w;
                                const isDelayCol = (c.key === 'reqDelayDays' || c.key === 'deliveryDelayDays');
                                return `
                            <td data-col-key="${c.key}" ondblclick="window.dcCopyCell('${esc(String(r[c.key]??''))}')" title="Double-click to copy"
                                style="border:1px solid #eef0f3; padding:3px 6px; min-width:${w}px; max-width:${w}px; width:${w}px; overflow:hidden; text-overflow:ellipsis; ${c.sticky?`position:sticky; left:${left}px; background:${rowBg}; z-index:1; font-weight:700;`:''} ${isDelayCol && r[c.key]>0 ?'color:#DC2626; font-weight:700;':''}">
                                ${(canEdit && c.editable) ? cellEditable(r, c, ri, ci) : cellReadonly(r, c)}
                            </td>`; }).join('')}
                        </tr>`; }).join('') || `<tr><td colspan="${cols.length}" style="padding:24px; text-align:center; color:#94a3b8;">No purchase requests match these filters.</td></tr>`}
